<script>
/* ============================================================
   ICONS
   ============================================================ */
const I = {
  play:'<path d="M6 4l13 8-13 8z"/>',
  pulse:'<path d="M22 12h-4l-3 9L9 3l-3 9H2"/>',
  alert:'<path d="M12 9v4M12 17h.01M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0z"/>',
  hand:'<path d="M18 11V6a2 2 0 0 0-4 0M14 10V4a2 2 0 0 0-4 0v2M10 10.5V6a2 2 0 0 0-4 0v8M18 8a2 2 0 1 1 4 0v6a8 8 0 0 1-8 8h-2c-2.8 0-4.5-.86-5.99-2.34l-3.6-3.6a2 2 0 0 1 2.83-2.82L7 15"/>',
  x:'<path d="M18 6 6 18M6 6l12 12"/>',
  check:'<path d="M20 6 9 17l-5-5"/>',
  checkCircle:'<path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><path d="m22 4-10 10.01L9 11"/>',
  clock:'<circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/>',
  calendar:'<rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/>',
  queue:'<path d="M3 6h18M3 12h18M3 18h12"/>',
  inbox:'<path d="M22 12h-6l-2 3h-4l-2-3H2"/><path d="M5.45 5.11 2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/>',
  wand:'<path d="m15 4 1 2 2 1-2 1-1 2-1-2-2-1 2-1zM3 21l9-9M14 14l3 3"/>',
  pause:'<path d="M10 4H6v16h4zM18 4h-4v16h4z"/>',
  file:'<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/>',
  paperclip:'<path d="m21.44 11.05-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>',
  msg:'<path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>',
  send:'<path d="M22 2 11 13M22 2l-7 20-4-9-9-4z"/>',
  link:'<path d="M10 13a5 5 0 0 0 7 0l3-3a5 5 0 0 0-7-7l-1 1"/><path d="M14 11a5 5 0 0 0-7 0l-3 3a5 5 0 0 0 7 7l1-1"/>',
  git:'<circle cx="6" cy="6" r="2.5"/><circle cx="6" cy="18" r="2.5"/><circle cx="18" cy="9" r="2.5"/><path d="M6 8.5v7M15.5 9.5 8 14"/>',
  copy:'<rect x="9" y="9" width="11" height="11" rx="2"/><path d="M5 15V5a2 2 0 0 1 2-2h10"/>',
  bolt:'<path d="M13 2 4.09 12.97a1 1 0 0 0 .77 1.64H11l-1 7.39 8.91-10.98a1 1 0 0 0-.77-1.64H12z"/>',
  refresh:'<path d="M3 12a9 9 0 0 1 15-6.7L21 8M21 3v5h-5M21 12a9 9 0 0 1-15 6.7L3 16M3 21v-5h5"/>',
  archive:'<rect x="3" y="3" width="18" height="5" rx="1"/><path d="M5 8v11a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8M10 12h4"/>',
  heart:'<path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7z"/>',
  spawn:'<circle cx="12" cy="12" r="3"/><path d="M12 2v4M12 18v4M2 12h4M18 12h4M5 5l2.5 2.5M16.5 16.5 19 19M19 5l-2.5 2.5M7.5 16.5 5 19"/>',
  reassign:'<path d="M16 3h5v5M21 3l-7 7M8 21H3v-5M3 21l7-7"/>',
  search:'<circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/>',
  user:'<circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0 1 16 0"/>',
};
function svg(p,w){return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="'+(w||2)+'" stroke-linecap="round" stroke-linejoin="round">'+p+'</svg>';}

/* ============================================================
   COLUMN META
   ============================================================ */
const COLUMNS = [
  {id:'triage',   name:'Triage',      color:'var(--triage)',    blurb:'Raw ideas — auto-decompose fans them out'},
  {id:'todo',     name:'Todo',        color:'var(--todo)',      blurb:'Waiting on dependencies or unassigned'},
  {id:'scheduled',name:'Scheduled',   color:'var(--scheduled)', blurb:'Waiting for a scheduled start time'},
  {id:'ready',    name:'Ready',       color:'var(--ready)',     blurb:'Assigned, queued for the dispatcher'},
  {id:'running',  name:'In Progress', color:'var(--running)',   blurb:'A worker is running this right now'},
  {id:'review',   name:'Review',      color:'var(--review)',    blurb:'Work done — awaiting your review'},
  {id:'blocked',  name:'Blocked',     color:'var(--blocked)',   blurb:'Needs input or the breaker tripped'},
  {id:'done',     name:'Done',        color:'var(--done)',      blurb:'Completed and handed off'},
];
const COLMAP = Object.fromEntries(COLUMNS.map(c=>[c.id,c]));

/* ============================================================
   FAKE DATA
   ============================================================ */
const TASKS = /*TASKS_JSON*/[];

/* ============================================================
   STATE
   ============================================================ */
let openTaskId=null;
let activeTab='overview';
let filters={search:'',tenant:'all',assignee:'all',attention:null};
let toastTimers=[];

/* ============================================================
   HELPERS
   ============================================================ */
function byId(id){return TASKS.find(t=>t.id===id);}
function el(tag,cls,html){const e=document.createElement(tag);if(cls)e.className=cls;if(html!=null)e.innerHTML=html;return e;}
function esc(s){return (s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

function hashHue(s){let h=0;for(let i=0;i<s.length;i++)h=s.charCodeAt(i)+((h<<5)-h);return Math.abs(h)%360;}
function avatarStyle(name){const hue=hashHue(name||'?');return `background:linear-gradient(135deg,hsl(${hue} 70% 64%),hsl(${(hue+40)%360} 70% 52%))`;}
function initials(name){if(!name)return '?';const p=name.split(/[-_ ]/).filter(Boolean);return (p[0][0]+(p[1]?p[1][0]:'')).toUpperCase();}

function relTime(ts){
  const d=now2()-ts, s=Math.round(d/1000);
  if(s<45)return s<=4?'just now':s+'s ago';
  const m=Math.round(s/60); if(m<60)return m+'m ago';
  const h=Math.round(m/60); if(h<24)return h+'h ago';
  const dd=Math.round(h/24); if(dd<14)return dd+'d ago';
  return Math.round(dd/7)+'w ago';
}
function untilTime(ts){
  const d=ts-now2(), s=Math.round(d/1000);
  if(s<=0)return 'now';
  const m=Math.round(s/60); if(m<60)return 'in '+m+'m';
  const h=Math.floor(s/3600), rem=Math.round((s%3600)/60);
  return 'in '+h+'h'+(rem?' '+rem+'m':'');
}
function elapsed(ts){
  const s=Math.max(0,Math.round((now2()-ts)/1000));
  const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=s%60;
  if(h>0)return h+'h '+String(m).padStart(2,'0')+'m';
  if(m>0)return m+'m '+String(sec).padStart(2,'0')+'s';
  return sec+'s';
}
function elapsedBetween(a,b){
  const s=Math.max(0,Math.round((b-a)/1000));
  const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=s%60;
  if(h>0)return h+'h '+m+'m';
  if(m>0)return m+'m '+sec+'s';
  return sec+'s';
}
function clockAt(ts){const d=new Date(ts);return d.toLocaleTimeString([], {hour:'numeric',minute:'2-digit'});}

// a "current time" that the live loop advances visually (kept simple: real Date.now)
function now2(){return Date.now();}

function mdLite(s){
  if(!s)return '';
  let out=esc(s);
  out=out.replace(/`([^`]+)`/g,'<code>$1</code>');
  out=out.replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>');
  out=out.replace(/\[([^\]]+)\]\((https?:[^)]+)\)/g,'<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>');
  // lists
  const lines=out.split('\n'); let html='',inList=false;
  for(const ln of lines){
    if(/^\s*[-*]\s+/.test(ln)){ if(!inList){html+='<ul>';inList=true;} html+='<li>'+ln.replace(/^\s*[-*]\s+/,'')+'</li>'; }
    else { if(inList){html+='</ul>';inList=false;} if(ln.trim())html+='<p>'+ln+'</p>'; }
  }
  if(inList)html+='</ul>';
  return html;
}

/* attention classification */
function attentionOf(t){
  if(t.status==='running'&&t.stale)return 'stall';
  if(t.status==='blocked'&&t.blockKind==='gave_up')return 'fail';
  if(t.status==='blocked'&&t.blockKind==='timed_out')return 'fail';
  if(t.status==='blocked')return 'need';
  if(t.status==='review')return 'need';
  if(t.status==='ready'&&t.stranded)return 'fail';
  if(t.status==='running')return 'run';
  return null;
}
function attempts(t){return t.runs?t.runs.filter(r=>r.outcome!=='active').length||(t.runs.some(r=>r.outcome==='active')&&t.runs.length>1?t.runs.length-1:0):0;}
function totalAttempts(t){return (t.runs||[]).length;}

function childProgress(t){
  if(!t.children||!t.children.length)return null;
  const kids=t.children.map(byId).filter(Boolean);
  if(!kids.length)return null;
  const done=kids.filter(k=>k.status==='done').length;
  return {done,total:kids.length};
}

/* ============================================================
   RENDER: ATTENTION STRIP
   ============================================================ */
function renderAttention(){
  const strip=document.getElementById('attentionStrip');
  const counts={need:0,run:0,stall:0,fail:0,done:0};
  TASKS.forEach(t=>{const a=attentionOf(t);if(a&&counts[a]!=null)counts[a]++; if(t.status==='done')counts.done++;});

  const cards=[
    {k:'need', n:counts.need, label:'need your input', ico:I.hand},
    {k:'run',  n:counts.run,  label:'running now',     ico:I.pulse},
    {k:'stall',n:counts.stall,label:'stalled',         ico:I.alert},
    {k:'fail', n:counts.fail, label:'failed / stranded',ico:I.x},
    {k:'done', n:counts.done, label:'done',             ico:I.check},
  ];
  strip.innerHTML='';
  const title=el('div','att-title','<b>Fleet status</b><span>'+TASKS.length+' tasks · live</span>');
  strip.appendChild(title);
  const wrap=el('div','att-cards');
  cards.forEach(c=>{
    const a=el('button','att '+c.k+(filters.attention===c.k?' active':''));
    a.innerHTML='<span class="ico">'+svg(c.ico)+'</span><span class="meta"><span class="n">'+c.n+'</span><span class="k">'+c.label+'</span></span>';
    a.onclick=()=>{filters.attention=(filters.attention===c.k?null:c.k);render();};
    wrap.appendChild(a);
  });
  strip.appendChild(wrap);
  if(filters.attention){
    const r=el('div','att-reset','<span>filtered to “'+cards.find(c=>c.k===filters.attention).label+'”</span>');
    const b=el('button',null,'clear'); b.onclick=()=>{filters.attention=null;render();};
    r.appendChild(b); strip.appendChild(r);
  }
}

/* ============================================================
   RENDER: CARD STATUS LINE
   ============================================================ */
function statusLine(t){
  const p=childProgress(t);
  switch(t.status){
    case 'triage':
      return {cls:'triage',ico:I.wand,html:'<b>In triage</b> — '+(orchestration==='auto'?'auto-decompose will fan this out':'decompose or specify to start')};
    case 'todo':{
      const parents=(t.parents||[]).map(byId).filter(Boolean);
      const doneP=parents.filter(x=>x.status==='done').length;
      if(parents.length) return {cls:'wait',ico:I.link,html:'Waiting on dependencies — <b>'+doneP+'/'+parents.length+'</b> parents done'};
      if(!t.assignee) return {cls:'wait',ico:I.user,html:'<b>Unassigned</b> — assign a profile to start'};
      return {cls:'wait',ico:I.clock,html:'Waiting to be promoted'};
    }
    case 'scheduled':
      return {cls:'sched',ico:I.calendar,html:'Starts <b>'+clockAt(t.scheduledAt)+'</b> · '+untilTime(t.scheduledAt)};
    case 'ready':
      if(t.stranded) return {cls:'fail',ico:I.alert,html:'<b>Stranded</b> — assignee “'+esc(t.assignee)+'” not found · <span class="tnum">'+t.strandedMins+'m</span>'};
      return {cls:'ready',ico:I.queue,html:'Queued for dispatch · next tick <span class="tnum">~'+(t.queuedFor||40)+'s</span>'};
    case 'running':
      if(t.stale) return {cls:'stale',ico:I.alert,html:'<b>No heartbeat <span class="tnum" data-stale="'+t.id+'">'+elapsed(t.lastHeartbeatAt)+'</span></b> — may be stuck',hb:'last: “'+esc(t.heartbeatNote)+'”'};
      return {cls:'run',live:true,html:'Running <b><span class="tnum" data-elapsed="'+t.id+'">'+elapsed(t.runStartedAt)+'</span></b>',hb:'♥ '+esc(t.heartbeatNote)};
    case 'review':
      return {cls:'review',ico:I.hand,html:'<b>Awaiting your review</b> · '+t.reviewFiles+' files, '+t.reviewTests+' tests pass'};
    case 'blocked':
      if(t.blockKind==='gave_up'||t.blockKind==='timed_out')
        return {cls:'fail',ico:I.x,html:'<b>Gave up</b> after '+totalAttempts(t)+' tries',hb:esc(t.blockReason),quote:true};
      return {cls:'need',ico:I.hand,html:'<b>Needs you</b>',hb:'“'+esc(t.blockReason)+'”',quote:true};
    case 'done':{
      const r=(t.runs||[]).find(x=>x.outcome==='completed');
      return {cls:'done',ico:I.check,html:'Done in <b>'+(r?elapsedBetween(r.startedAt,r.endedAt):'—')+'</b>',hb:r&&r.summary?'“'+esc(r.summary)+'”':null,quote:true};
    }
  }
  return {cls:'wait',ico:I.clock,html:t.status};
}

/* ============================================================
   RENDER: CARD
   ============================================================ */
function makeCard(t){
  const card=el('div','card');
  card.style.borderLeftColor=COLMAP[t.status].color;
  const att=attentionOf(t);
  if(att==='need')card.classList.add('glow-need');
  if(att==='fail')card.classList.add('glow-fail');
  if(att==='stall')card.classList.add('glow-stale');
  card.setAttribute('draggable','true');
  card.dataset.id=t.id;

  // top row
  let top='<span class="card-id">'+t.id+'</span><span class="card-top-spacer"></span>';
  if(t.priority>0)top+='<span class="prio p'+t.priority+'">P'+t.priority+'</span>';
  if(t.tenant)top+='<span class="tenant">'+esc(t.tenant)+'</span>';

  // status line
  const s=statusLine(t);
  let sl='<div class="statusline '+s.cls+(s.live?'':'')+'" data-statusline="'+t.id+'">';
  sl+='<span class="sico">'+(s.live?'<span class="pulse"><i></i></span>':svg(s.ico))+'</span>';
  sl+='<span class="stext">'+s.html;
  if(s.hb)sl+='<span class="hb'+(s.quote?' quote':'')+'">'+s.hb+'</span>';
  sl+='</span></div>';

  // foot
  let foot='<div class="card-foot">';
  if(t.assignee)foot+='<span class="assignee"><span class="avatar" style="'+avatarStyle(t.assignee)+'">'+initials(t.assignee)+'</span><span class="an">'+esc(t.assignee)+'</span></span>';
  else foot+='<span class="assignee"><span class="an unassigned">unassigned</span></span>';
  foot+='<span class="card-foot-spacer"></span>';
  const tot=totalAttempts(t);
  if(tot>1)foot+='<span class="fchip attempt" title="'+tot+' attempts">'+svg(I.refresh)+'×'+tot+'</span>';
  if((t.comments||[]).length)foot+='<span class="fchip" title="comments">'+svg(I.msg)+(t.comments.length)+'</span>';
  const p=childProgress(t);
  if(p)foot+='<span class="progress-pill" title="'+p.done+'/'+p.total+' subtasks done">'+p.done+'/'+p.total+'<span class="bar"><i style="width:'+(p.total?Math.round(p.done/p.total*100):0)+'%"></i></span></span>';
  foot+='</div>';

  card.innerHTML='<div class="card-top">'+top+'</div><div class="card-title">'+esc(t.title)+'</div>'+sl+foot;

  card.onclick=()=>openTask(t.id);
  // drag
  card.addEventListener('dragstart',e=>{e.dataTransfer.setData('text/plain',t.id);card.classList.add('dragging');dragId=t.id;});
  card.addEventListener('dragend',()=>{card.classList.remove('dragging');dragId=null;document.querySelectorAll('.col').forEach(c=>c.classList.remove('drag-over'));});
  return card;
}

/* ============================================================
   RENDER: BOARD
   ============================================================ */
let dragId=null;
function taskMatches(t){
  if(filters.tenant!=='all'&&t.tenant!==filters.tenant)return false;
  if(filters.assignee!=='all'&&t.assignee!==filters.assignee)return false;
  if(filters.search){
    const q=filters.search.toLowerCase();
    if(!(t.title.toLowerCase().includes(q)||t.id.toLowerCase().includes(q)||(t.assignee||'').toLowerCase().includes(q)||(t.tenant||'').toLowerCase().includes(q)))return false;
  }
  return true;
}
function attentionMatch(t){
  if(!filters.attention)return true;
  if(filters.attention==='done')return t.status==='done';
  return attentionOf(t)===filters.attention;
}

function renderBoard(){
  const board=document.getElementById('board');
  board.innerHTML='';
  let anyVisible=false;

  COLUMNS.forEach(col=>{
    const tasks=TASKS.filter(t=>t.status===col.id);
    const colEl=el('div','col');colEl.dataset.col=col.id;
    const head=el('div','col-head');
    head.innerHTML='<span class="col-dot" style="background:'+col.color+'"></span>'+
      '<span class="col-name">'+col.name+'</span>'+
      '<span class="col-count">'+tasks.length+'</span>';
    const add=el('button','col-add',svg(I.bolt));add.title='Add task to '+col.name;
    add.onclick=(e)=>{e.stopPropagation();openCreate(colEl,col.id);};
    head.appendChild(add);
    colEl.appendChild(head);
    colEl.appendChild(el('div','col-blurb',col.blurb));

    const body=el('div','col-body');body.dataset.col=col.id;
    let shown=0;
    tasks.forEach(t=>{
      const visible=taskMatches(t)&&attentionMatch(t);
      const card=makeCard(t);
      if(!visible){card.classList.add('dimmed');}
      else {shown++;anyVisible=true;}
      body.appendChild(card);
    });
    if(!tasks.length)body.appendChild(el('div','col-empty','— no tasks —'));

    // drag targets
    colEl.addEventListener('dragover',e=>{e.preventDefault();colEl.classList.add('drag-over');});
    colEl.addEventListener('dragleave',e=>{if(!colEl.contains(e.relatedTarget))colEl.classList.remove('drag-over');});
    colEl.addEventListener('drop',e=>{e.preventDefault();colEl.classList.remove('drag-over');
      const id=e.dataTransfer.getData('text/plain')||dragId;if(id)moveTask(id,col.id);});

    colEl.appendChild(body);
    board.appendChild(colEl);
  });

  // empty search state
  const old=board.parentElement.querySelector('.board-empty');if(old)old.remove();
  if(!anyVisible&&(filters.search||filters.tenant!=='all'||filters.assignee!=='all'||filters.attention)){
    const e=el('div','board-empty','<div class="board-empty-card">'+svg(I.search)+'<b>No tasks match</b>Try clearing filters or search.</div>');
    e.style.pointerEvents='none';
    board.parentElement.appendChild(e);
  }
}

/* ============================================================
   RENDER: DRAWER
   ============================================================ */
function currentRun(t){return (t.runs||[]).find(r=>r.outcome==='active')||null;}
function latestRun(t){return (t.runs||[])[0]||null;}
function completedRun(t){return (t.runs||[]).find(r=>r.outcome==='completed')||null;}
function metric(v,l){return {v:v,l:l};}
function safeMetric(v){return v==null||v===''?'—':String(v);}

function heroFor(t){
  const p=childProgress(t);
  const cur=currentRun(t);
  const done=completedRun(t);
  switch(t.status){
    case 'running':
      if(t.stale)return {cls:'h-stale',ico:I.alert,eyebrow:'Running · stalled',
        headline:'No heartbeat for '+elapsed(t.lastHeartbeatAt),
        sub:'Last signal: <span class="q">'+esc(t.heartbeatNote||'no heartbeat note')+'</span>. The worker may be stuck or waiting on a long command.',
        metrics:[metric(elapsed(t.runStartedAt),'runtime'),metric('#'+(cur?cur.n:totalAttempts(t)),'attempt'),metric(t.pid||'—','pid')]};
      return {cls:'h-run',ico:I.pulse,eyebrow:'In progress',
        headline:esc(t.assignee||'worker')+' is working on this',
        sub:'Live heartbeat: <span class="q">'+esc(t.heartbeatNote||'working')+'</span>',
        metrics:[metric(elapsed(t.runStartedAt),'elapsed'),metric('#'+(cur?cur.n:totalAttempts(t)),'attempt'),metric(clockAt(t.runStartedAt),'started')]};
    case 'review':
      return {cls:'h-review',ico:I.hand,eyebrow:'Awaiting review',headline:'The agent finished its pass. You need to decide next.',
        sub:esc(t.blockReason||'Review the run summary, changed files, and logs before signing off.'),
        metrics:[metric(t.reviewFiles||'—','files'),metric(t.reviewTests||'—','tests passing'),metric(totalAttempts(t),'attempts')]};
    case 'blocked':
      if(t.blockKind==='gave_up'||t.blockKind==='timed_out')return {cls:'h-fail',ico:I.x,eyebrow:'Failed',
        headline:'Breaker tripped after '+totalAttempts(t)+' attempt'+(totalAttempts(t)===1?'':'s'),
        sub:'Reason: <span class="q">'+esc(t.blockReason||'unknown failure')+'</span>',
        metrics:[metric(totalAttempts(t),'attempts'),metric(t.maxRetries||'—','retry limit'),metric(t.blockKind||'blocked','state')]};
      return {cls:'h-need',ico:I.hand,eyebrow:'Needs you',headline:'The worker stopped for human input',
        sub:'Reason: <span class="q">'+esc(t.blockReason||'waiting on input')+'</span>',
        metrics:[metric(totalAttempts(t),'attempts'),metric(t.assignee||'—','assignee'),metric(relTime((t.events||[]).slice(-1)[0]?.at||t.createdAt),'last event')]};
    case 'done':
      return {cls:'h-done',ico:I.checkCircle,eyebrow:'Done',headline:'Completed and handed off',
        sub:done&&done.summary?esc(done.summary):'No completion summary was recorded.',
        metrics:[metric(done?elapsedBetween(done.startedAt,done.endedAt):'—','duration'),metric(done?.metadata?.changed_files?.length||'—','files'),metric(done?.metadata?.tests_run||'—','tests')]};
    case 'ready':
      if(t.stranded)return {cls:'h-fail',ico:I.alert,eyebrow:'Ready · stranded',headline:'Queued, but no matching worker profile exists',
        sub:'Assignee <span class="q">'+esc(t.assignee||'unassigned')+'</span> could not be spawned. Reassign this before it can run.',
        metrics:[metric((t.strandedMins||0)+'m','stranded'),metric(t.assignee||'—','assignee'),metric('manual fix','next step')]};
      return {cls:'h-ready',ico:I.queue,eyebrow:'Ready',headline:'Queued for the dispatcher',
        sub:'This task has an assignee and will run when the dispatcher claims it.',
        metrics:[metric('~'+(t.queuedFor||40)+'s','next tick'),metric(t.assignee||'—','assignee'),metric(t.workspace||'—','workspace')]};
    case 'scheduled':
      return {cls:'h-sched',ico:I.calendar,eyebrow:'Scheduled',headline:'Waiting until '+clockAt(t.scheduledAt),
        sub:'It will move to Ready when the scheduled time arrives.',
        metrics:[metric(untilTime(t.scheduledAt),'starts'),metric(clockAt(t.scheduledAt),'time'),metric(t.assignee||'—','assignee')]};
    case 'todo':
      if(p)return {cls:'h-wait',ico:I.clock,eyebrow:'Waiting',headline:p.done+' of '+p.total+' subtasks complete',
        sub:'Dependencies need to finish before this can be promoted.',
        metrics:[metric(p.done+'/'+p.total,'children done'),metric(t.assignee||'—','assignee'),metric(relTime(t.createdAt),'created')]};
      if(!t.assignee)return {cls:'h-wait',ico:I.user,eyebrow:'Unassigned',headline:'This cannot run until it has a worker profile',
        sub:'Assign a worker, then promote it to Ready.',
        metrics:[metric('none','assignee'),metric(t.tenant||'—','tenant'),metric(relTime(t.createdAt),'created')]};
      return {cls:'h-wait',ico:I.queue,eyebrow:'Todo',headline:'Not ready for dispatch yet',
        sub:'Promote this when prerequisites are clear.',
        metrics:[metric(t.assignee||'—','assignee'),metric(t.tenant||'—','tenant'),metric(relTime(t.createdAt),'created')]};
    case 'triage':
      return {cls:'h-triage',ico:I.inbox,eyebrow:'Triage',headline:'Raw request awaiting decomposition',
        sub:'Turn this into smaller runnable tasks or promote it directly.',
        metrics:[metric(t.createdBy||'—','source'),metric(t.tenant||'—','tenant'),metric(relTime(t.createdAt),'created')]};
  }
  return {cls:'h-wait',ico:I.clock,eyebrow:t.status,headline:esc(t.title),sub:'No state summary available.',metrics:[]};
}

function actionSpecs(t){
  const a=[];
  if(t.status==='ready')a.push({id:'start',label:'Start',icon:I.play,cls:'btn-primary'});
  if(t.status==='running'){
    a.push({id:'complete',label:'Complete',icon:I.check,cls:'b-done'});
    a.push({id:'block',label:'Block',icon:I.pause,cls:'btn-ghost'});
  }
  if(t.status==='blocked')a.push({id:'unblock',label:'Unblock',icon:I.check,cls:'b-ready'});
  if(t.status==='done')a.push({id:'reopen',label:'Reopen',icon:I.refresh,cls:'btn-ghost'});
  if(t.status==='todo')a.push({id:'markReady',label:'Mark ready',icon:I.queue,cls:'btn-primary'});
  if(t.status==='review')a.push({id:'approve',label:'Approve',icon:I.check,cls:'b-done'});
  return a;
}
function actionButtonHtml(a){return '<button class="btn '+(a.cls||'btn-ghost')+'" data-act="'+a.id+'">'+svg(a.icon)+' '+esc(a.label)+'</button>';}

function statusBadge(t){
  const col=COLMAP[t.status]||COLMAP.todo;
  const s=statusLine(t);
  return '<span class="dr-id" style="border:1px solid '+col.color+';color:'+col.color+'">'+esc(col.name)+'</span>'+
    '<span class="dr-id">'+(s.live?'live':esc((attentionOf(t)||'normal')))+'</span>';
}

function renderHero(t){
  const h=heroFor(t);
  const acts=actionSpecs(t).map(actionButtonHtml).join('');
  const metrics=(h.metrics||[]).map(m=>'<span class="hero-metric"><span class="mv">'+esc(safeMetric(m.v))+'</span><span class="ml">'+esc(m.l)+'</span></span>').join('');
  return '<section class="hero '+h.cls+'"><div class="hero-row"><span class="hero-ico">'+svg(h.ico)+'</span><div class="hero-main">'+
    '<div class="hero-eyebrow">'+esc(h.eyebrow)+'</div><div class="hero-headline">'+h.headline+'</div>'+
    '<div class="hero-sub">'+h.sub+'</div>'+
    (metrics?'<div class="hero-metrics">'+metrics+'</div>':'')+
    (acts?'<div class="hero-actions">'+acts+'</div>':'')+
    '</div></div></section>';
}

function depDot(status){return (COLMAP[status]&&COLMAP[status].color)||'var(--text-3)';}
function depChip(x){
  return '<div class="dep-chip" data-open-task="'+x.id+'"><span class="ddot" style="background:'+depDot(x.status)+'"></span>'+
    '<span class="did">'+x.id+'</span><span class="dtitle">'+esc(x.title)+'</span><span class="dstat" style="color:'+depDot(x.status)+';background:var(--surface-3)">'+esc(x.status)+'</span></div>';
}
function renderDependencies(t){
  const parents=(t.parents||[]).map(byId).filter(Boolean), kids=(t.children||[]).map(byId).filter(Boolean);
  if(!parents.length&&!kids.length)return '<div class="dep-none">No dependencies.</div>';
  let h='<div class="deps">';
  if(parents.length)h+='<div class="dep-group"><div class="dgl">Blocked by</div>'+parents.map(depChip).join('')+'</div>';
  if(kids.length)h+='<div class="dep-group"><div class="dgl">Child tasks</div>'+kids.map(depChip).join('')+'</div>';
  return h+'</div>';
}
function renderAttachments(t){
  if(!(t.attachments||[]).length)return '<div class="dep-none">No attachments.</div>';
  return t.attachments.map(a=>'<div class="attach">'+svg(I.paperclip)+'<span class="afn">'+esc(a.name)+'</span><span class="asz">'+esc(a.size||'')+'</span></div>').join('');
}
function section(title,body,edit){return '<section class="sec"><div class="sec-h"><span>'+esc(title)+'</span><span class="hr"></span>'+(edit?'<span class="ed">'+esc(edit)+'</span>':'')+'</div>'+body+'</section>';}
function renderOverview(t){
  return section('What this task is', t.body?'<div class="md">'+mdLite(t.body)+'</div>':'<div class="md-empty">No description.</div>','edit')+
    section('Dependencies',renderDependencies(t))+
    section('Attachments',renderAttachments(t));
}

const OUTCOME={
  active:{label:'ACTIVE',icon:I.pulse,color:'var(--running)',soft:'var(--running-soft)',cls:'active'},
  completed:{label:'COMPLETED',icon:I.check,color:'var(--done)',soft:'var(--done-soft)'},
  blocked:{label:'BLOCKED',icon:I.hand,color:'var(--attention)',soft:'var(--attention-soft)'},
  gave_up:{label:'GAVE UP',icon:I.x,color:'var(--danger)',soft:'var(--danger-soft)'},
  spawn_failed:{label:'SPAWN FAILED',icon:I.alert,color:'#ffb454',soft:'var(--attention-soft)'},
  crashed:{label:'CRASHED',icon:I.alert,color:'#ffb454',soft:'var(--attention-soft)'},
  timed_out:{label:'TIMED OUT',icon:I.alert,color:'var(--danger)',soft:'var(--danger-soft)'},
  cancelled:{label:'CANCELLED',icon:I.pause,color:'var(--text-3)',soft:'var(--surface-3)'}
};
function outcomeInfo(o){return OUTCOME[o]||{label:String(o||'UNKNOWN').toUpperCase(),icon:I.clock,color:'var(--text-3)',soft:'var(--surface-3)'};}

function listBlock(label,arr){
  if(!arr||!arr.length)return '';
  return '<div class="rmeta-block"><div class="rmh">'+esc(label)+' <span class="c">'+arr.length+'</span></div><ul class="rmeta-list">'+arr.map(x=>'<li>'+esc(x)+'</li>').join('')+'</ul></div>';
}
function renderRunMetadata(r){
  const m=r.metadata||{}; let h='';
  if(m.changed_files&&m.changed_files.length){
    h+='<div class="rmeta-block"><div class="rmh">Changed files <span class="c">'+m.changed_files.length+'</span></div><div class="filechips">'+
      m.changed_files.map(f=>'<span class="filechip">'+svg(I.file)+esc(f)+'</span>').join('')+'</div></div>';
  }
  const stats=[];
  ['tests_run','strings','tokens_used','duration_seconds','failures','effective_limit','review_iteration'].forEach(k=>{if(m[k]!=null)stats.push([k,m[k]]);});
  if(stats.length)h+='<div class="rmeta-block"><div class="rmh">Run stats</div><div class="rmeta-stats">'+stats.map(s=>'<span class="rmeta-stat"><span class="v">'+esc(s[1])+'</span><span class="l">'+esc(s[0].replace(/_/g,' '))+'</span></span>').join('')+'</div></div>';
  h+=listBlock('Decisions',m.decisions)+listBlock('Acceptance criteria',m.acceptance)+listBlock('Verification',m.verification);
  if(m.strategy)h+='<div class="rmeta-callout"><b>Strategy:</b> '+esc(m.strategy)+'</div>';
  if(m.pr_url)h+='<a class="prlink" href="'+esc(m.pr_url)+'" target="_blank" rel="noopener noreferrer">'+svg(I.git)+'Open PR</a>';
  if(!h)return '';
  return '<div class="rmeta">'+h+'</div>';
}
function runSummary(r){
  if(r.outcome==='active')return '<div class="run-live"><span class="sico"><span class="pulse"><i></i></span></span>Still running · elapsed '+elapsed(r.startedAt)+'</div>';
  if(r.error)return '<div class="run-summary error-s"><span class="rsl">Why it failed</span>'+esc(r.error)+'</div>';
  if(r.outcome==='blocked'||r.outcome==='gave_up'||r.outcome==='timed_out')return '<div class="run-summary blocked-s"><span class="rsl">Why it stopped</span>'+esc(r.summary||'Stopped without a structured summary.')+'</div>';
  if(r.outcome==='cancelled')return '<div class="run-summary"><span class="rsl">Stopped manually</span>'+esc(r.summary||'The run was cancelled.')+'</div>';
  return '<div class="run-summary"><span class="rsl">What it did</span>'+esc(r.summary||'No run summary was recorded.')+'</div>';
}
function renderRuns(t){
  const runs=(t.runs||[]).slice();
  if(!runs.length)return '<div class="log-empty">No run history yet. This task has not been claimed by a worker.</div>';
  return '<div class="runs">'+runs.map(r=>{
    const o=outcomeInfo(r.outcome);
    return '<article class="run"><span class="run-node" style="background:'+o.soft+';color:'+o.color+'">'+svg(o.icon)+'</span>'+
      '<div class="run-card '+(o.cls||'')+'"><div class="run-head"><span class="run-attempt">Attempt '+r.n+'</span>'+
      '<span class="run-outcome" style="background:'+o.soft+';color:'+o.color+'">'+svg(o.icon)+o.label+'</span>'+
      '<span class="run-head-spacer"></span><span class="run-meta-inline"><span class="rm">'+svg(I.user)+esc(r.profile||t.assignee||'worker')+'</span><span class="rm">'+svg(I.clock)+(r.endedAt?elapsedBetween(r.startedAt,r.endedAt):elapsed(r.startedAt))+'</span></span></div>'+
      '<div class="run-body">'+runSummary(r)+renderRunMetadata(r)+'</div></div></article>';
  }).join('')+'</div>';
}

function eventInfo(k){
  const map={created:['Created',I.inbox],promoted:['Promoted',I.queue],claimed:['Claimed',I.hand],spawned:['Worker spawned',I.spawn],heartbeat:['Heartbeat',I.heart],completed:['Completed',I.check],blocked:['Blocked',I.hand],gave_up:['Gave up',I.x],spawn_failed:['Spawn failed',I.alert],crashed:['Crashed',I.alert],timed_out:['Timed out',I.alert],stale:['Stale',I.alert],unblocked:['Unblocked',I.check],reclaimed:['Reclaimed',I.refresh],skipped_nonspawnable:['Skipped',I.alert],reassigned:['Reassigned',I.reassign],commented:['Commented',I.msg],cancelled:['Cancelled',I.pause],archived:['Archived',I.archive],reopened:['Reopened',I.refresh]};
  return map[k]||[k||'Event',I.clock];
}
function eventDesc(ev){
  const p=ev.payload||{};
  switch(ev.kind){
    case 'created':return 'Task created'+(p.assignee?' for '+p.assignee:'')+(p.parents?' with '+p.parents.length+' parent dependency':'')+'.';
    case 'promoted':return 'Moved into the ready queue.';
    case 'claimed':return 'Dispatcher claimed the task'+(p.run_id?' as '+p.run_id:'')+'.';
    case 'spawned':return 'Worker process started'+(p.pid?' with pid '+p.pid:'')+'.';
    case 'heartbeat':return p.note||'Worker sent a heartbeat.';
    case 'completed':return p.summary||'Task completed.';
    case 'blocked':return p.reason||'Worker blocked and needs input.';
    case 'gave_up':return (p.error||'Failed repeatedly')+' after '+(p.failures||'multiple')+' failure(s).';
    case 'spawn_failed':return p.error||'The worker could not be spawned.';
    case 'crashed':return p.error||'The worker crashed.';
    case 'reclaimed':return 'Dispatcher reclaimed a stale lock.';
    case 'skipped_nonspawnable':return 'No worker profile named '+(p.assignee||'assignee')+'.';
    case 'reassigned':return 'Assigned to '+(p.assignee||'another worker')+'.';
    case 'commented':return (p.author||'Someone')+' added a comment.';
    case 'cancelled':return 'Run was stopped manually.';
    case 'unblocked':return 'Human unblocked this task.';
    case 'reopened':return 'Task reopened and placed back in Ready.';
  }
  return Object.keys(p).length?JSON.stringify(p):'No details.';
}
function renderEvents(t){
  const evs=(t.events||[]).slice().sort((a,b)=>b.at-a.at);
  if(!evs.length)return '<div class="log-empty">No activity events yet.</div>';
  return '<div class="events">'+evs.map(ev=>{
    const e=eventInfo(ev.kind);
    return '<div class="ev"><span class="ev-line"></span><span class="ev-dot c-'+esc(ev.kind)+'">'+svg(e[1])+'</span><div class="ev-main">'+
      '<div class="ev-row"><span class="ev-kind">'+esc(e[0])+'</span><span class="ev-time">'+relTime(ev.at)+'</span></div>'+
      '<div class="ev-desc">'+esc(eventDesc(ev))+'</div><pre class="ev-payload">'+esc(JSON.stringify(ev.payload||{},null,2))+'</pre></div></div>';
  }).join('')+'</div>';
}

function renderComments(t){
  const comments=t.comments||[];
  let h='<div class="thread">';
  if(!comments.length)h+='<div class="log-empty">No comments yet. Add context or review feedback here.</div>';
  comments.forEach(c=>{
    const role=c.role||'agent';
    h+='<div class="cmt '+esc(role)+'">'+(role==='system'?'':'<span class="avatar" style="'+avatarStyle(c.author)+'">'+initials(c.author)+'</span>')+
      '<div class="cmt-bub"><div class="cmt-meta"><span class="cmt-author">'+esc(c.author||'system')+'</span><span class="cmt-time">'+relTime(c.at)+'</span></div><div class="cmt-text">'+mdLite(c.body||'')+'</div></div></div>';
  });
  h+='</div><div class="composer"><textarea id="commentBox" placeholder="Add a note, review decision, or unblock context…"></textarea><button class="send" data-act="sendComment" title="Send">'+svg(I.send)+'</button></div>';
  return h;
}

function highlightLog(log){
  return esc(log||'').split('\n').map(line=>{
    let cls='log-l';
    if(/ERROR|failed|CIRCUIT|kill|blocked/i.test(line))cls='log-err';
    else if(/WARN|stale|retry|no further/i.test(line))cls='log-warn';
    else if(/passed|completed|ok|green/i.test(line))cls='log-ok';
    else if(/heartbeat|spawned|claiming|implemented|translated/i.test(line))cls='log-info';
    return '<span class="'+cls+'">'+line.replace(/^(\[[^\]]+\])/, '<span class="log-ts">$1</span>')+'</span>';
  }).join('\n');
}
function renderLogs(t){
  const r=latestRun(t);
  if(!t.log)return '<div class="log-empty">No worker log has been captured for this task.</div>';
  return '<div class="logbar"><span class="lt">'+esc(r?.logPath||'worker.log')+'</span><button class="logbtn" data-act="copyLog">'+svg(I.copy)+'Copy</button></div>'+
    '<div class="logwrap"><pre>'+highlightLog(t.log)+'</pre></div>';
}
function renderDetails(t){
  const cells=[
    ['Task ID',t.id],['Status',t.status],['Tenant',t.tenant],['Assignee',t.assignee||'unassigned'],
    ['Workspace',t.workspace||'—'],['Created by',t.createdBy||'—'],['Created',relTime(t.createdAt)],['Priority',t.priority?'P'+t.priority:'none'],
    ['Parents',(t.parents||[]).join(', ')||'none'],['Children',(t.children||[]).join(', ')||'none']
  ];
  let h='<div class="dgrid">'+cells.map(c=>'<div class="dcell"><div class="dk">'+esc(c[0])+'</div><div class="dv '+(c[1]==='none'||c[1]==='unassigned'?'dim':'')+'">'+esc(c[1])+'</div></div>').join('');
  const skills=[t.assignee,t.tenant,t.workspace].filter(Boolean);
  h+='<div class="dcell full"><div class="dk">Signals</div><div class="dv">'+skills.map(s=>'<span class="skilltag">'+esc(s)+'</span>').join('')+'</div></div></div>';
  return h;
}

function availableTabs(t){
  return [
    {id:'overview',label:'Overview'},
    {id:'history',label:'Run history',count:(t.runs||[]).length},
    {id:'activity',label:'Activity',count:(t.events||[]).length},
    {id:'comments',label:'Comments',count:(t.comments||[]).length},
    {id:'logs',label:'Logs'},
    {id:'details',label:'Details'}
  ];
}
function renderPanel(t){
  if(activeTab==='history')return renderRuns(t);
  if(activeTab==='activity')return renderEvents(t);
  if(activeTab==='comments')return renderComments(t);
  if(activeTab==='logs')return renderLogs(t);
  if(activeTab==='details')return renderDetails(t);
  return renderOverview(t);
}
function renderDrawer(){
  const drawer=document.getElementById('drawer');
  const t=byId(openTaskId);
  if(!t){drawer.innerHTML='';return;}
  const tabs=availableTabs(t); if(!tabs.some(x=>x.id===activeTab))activeTab='overview';
  const tabHtml=tabs.map(tb=>'<button class="tab '+(activeTab===tb.id?'on':'')+'" data-tab="'+tb.id+'">'+esc(tb.label)+(tb.count!=null?'<span class="cnt">'+tb.count+'</span>':'')+'</button>').join('');
  drawer.innerHTML='<div class="dr-top"><div class="dr-top-main"><div class="dr-idrow"><span class="dr-id" data-act="copyId" title="Copy task id">'+t.id+'</span>'+statusBadge(t)+'</div><h1 class="dr-title">'+esc(t.title)+'</h1></div><button class="dr-close" data-act="closeDrawer">'+svg(I.x)+'</button></div>'+
    renderHero(t)+'<div class="tabs">'+tabHtml+'</div><div class="dr-body"><div class="panel on">'+renderPanel(t)+'</div></div>'+
    '<div class="dr-foot"><button class="btn btn-ghost" data-act="copyId">'+svg(I.copy)+'Copy ID</button><button class="btn btn-ghost" data-act="jumpComments">'+svg(I.msg)+'Comment</button><span class="spacer"></span><button class="btn btn-danger-ghost" data-act="archive">'+svg(I.archive)+'Archive</button></div>';
  bindDrawerInputs();
}
function bindDrawerInputs(){
  const box=document.getElementById('commentBox');
  if(box){
    box.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendComment();}});
    setTimeout(()=>{try{box.focus({preventScroll:true});}catch(_){}},0);
  }
}
function openTask(id){openTaskId=id;activeTab='overview';document.getElementById('drawer').classList.add('open');document.getElementById('drawer').setAttribute('aria-hidden','false');document.getElementById('scrim').classList.add('open');renderDrawer();}
function closeTask(){openTaskId=null;closeMenus();document.getElementById('drawer').classList.remove('open');document.getElementById('drawer').setAttribute('aria-hidden','true');document.getElementById('scrim').classList.remove('open');}

function moveTask(id,status){
  const t=byId(id); if(!t||t.status===status)return;
  const fd=new URLSearchParams();fd.append('task_id',id);fd.append('status',status);
  fetch('/kanban/move',{method:'POST',body:fd,headers:{'Accept':'application/json'}})
    .then(r=>r.json()).then(data=>{
      TASKS.length=0;TASKS.push(...data);
      toast('Moved <b>'+esc(id)+'</b> to '+COLMAP[status].name,'ok');
      render();if(openTaskId===id)renderDrawer();
    }).catch(()=>{toast('Move failed','warn');});
}

function doAction(act,ev){
  const t=byId(openTaskId); if(!t)return;
  if(act==='closeDrawer')return closeTask();
  if(act==='copyId')return copyText(t.id,'Copied task ID');
  if(act==='copyLog')return copyText(t.log||'','Copied log');
  if(act==='jumpComments'){activeTab='comments';renderDrawer();return;}
  if(act==='sendComment')return sendComment();
  if(act==='start'){moveTask(t.id,'running');return;}
  if(act==='complete'){moveTask(t.id,'done');return;}
  if(act==='block'){moveTask(t.id,'blocked');return;}
  if(act==='unblock'){moveTask(t.id,'ready');return;}
  if(act==='reopen'){moveTask(t.id,'ready');return;}
  if(act==='markReady'){moveTask(t.id,'ready');return;}
  if(act==='approve'){moveTask(t.id,'done');return;}
}
function sendComment(){
  const t=byId(openTaskId), box=document.getElementById('commentBox'); if(!t||!box)return;
  const cbody=box.value.trim(); if(!cbody)return;
  const fd=new URLSearchParams();fd.append('task_id',openTaskId);fd.append('author','web');fd.append('body',cbody);
  fetch('/kanban/comment',{method:'POST',body:fd,headers:{'Accept':'application/json'}})
    .then(r=>r.json()).then(data=>{
      TASKS.length=0;TASKS.push(...data);
      activeTab='comments';render();renderDrawer();toast('Comment added','ok');
    }).catch(()=>{toast('Comment failed','warn');});
}
function createTask(status,title,assignee,tenant){
  const fd=new URLSearchParams();fd.append('title',title);
  if(assignee)fd.append('assignee',assignee);
  fd.append('status',status||'running');
  fetch('/kanban/create',{method:'POST',body:fd,headers:{'Accept':'application/json'}})
    .then(r=>r.json()).then(data=>{
      TASKS.length=0;TASKS.push(...data);
      toast('Created task','ok');render();
    }).catch(()=>{toast('Create failed','warn');});
}


function openCreate(colEl,status){
  document.querySelectorAll('.createform').forEach(f=>f.remove());
  const body=colEl.querySelector('.col-body');
  const f=el('div','createform');
  f.innerHTML='<input class="cf-title" placeholder="Task title"><div class="cf-row"><input class="cf-assignee" placeholder="assignee"><input class="cf-tenant" placeholder="tenant"></div><div class="cf-actions"><button class="cf-btn cancel">Cancel</button><button class="cf-btn go">Create</button></div>';
  body.prepend(f);
  const title=f.querySelector('.cf-title'), ass=f.querySelector('.cf-assignee'), ten=f.querySelector('.cf-tenant'); title.focus();
  f.querySelector('.cancel').onclick=()=>f.remove();
  f.querySelector('.go').onclick=()=>{const v=title.value.trim(); if(!v)return; createTask(status,v,ass.value.trim()||null,ten.value.trim()||'personal'); toast('Created task in '+COLMAP[status].name,'ok'); render();};
  title.addEventListener('keydown',e=>{if(e.key==='Enter')f.querySelector('.go').click(); if(e.key==='Escape')f.remove();});
}

function toast(msg,type,undo){
  type=type||'info'; const wrap=document.getElementById('toasts'); const n=el('div','toast '+type);
  const ico=type==='ok'?I.check:type==='warn'?I.alert:I.bolt;
  n.innerHTML='<span class="tic">'+svg(ico)+'</span><span class="tmsg">'+msg+'</span>'+(undo?'<button class="tundo">undo</button>':'');
  if(undo)n.querySelector('.tundo').onclick=()=>{undo();dismissToast(n);};
  wrap.appendChild(n); const tm=setTimeout(()=>dismissToast(n),4200); toastTimers.push(tm);
}
function dismissToast(n){if(!n||!n.parentElement)return;n.classList.add('out');setTimeout(()=>n.remove(),260);}
function copyText(text,msg){
  if(navigator.clipboard&&navigator.clipboard.writeText)navigator.clipboard.writeText(text).catch(()=>{});
  toast(msg||'Copied','ok');
}

function closeMenus(){document.querySelectorAll('.pop-menu').forEach(m=>m.remove());}
function openMenu(anchor,title,items){
  closeMenus(); const m=el('div','pop-menu'); m.innerHTML='<div class="pm-h">'+esc(title)+'</div>';
  items.forEach(it=>{
    if(it.sep){m.appendChild(el('div','pm-sep'));return;}
    const b=el('button','pm-item');
    b.innerHTML='<span class="pmi">'+(it.icon&&it.icon.includes('<')?it.icon:esc(it.icon||''))+'</span><span class="pmt"><b>'+esc(it.title)+'</b><span>'+esc(it.sub||'')+'</span></span>'+(it.checked?'<span class="pmc">'+svg(I.check)+'</span>':'');
    b.onclick=()=>{closeMenus();it.onClick&&it.onClick();}; m.appendChild(b);
  });
  document.body.appendChild(m); const r=anchor.getBoundingClientRect(); const w=m.offsetWidth;
  m.style.left=Math.min(window.innerWidth-w-10,Math.max(10,r.left))+'px'; m.style.top=Math.min(window.innerHeight-m.offsetHeight-10,r.bottom+8)+'px';
  setTimeout(()=>document.addEventListener('pointerdown',outsideMenu,{once:true}),0);
}
function outsideMenu(e){if(!e.target.closest('.pop-menu'))closeMenus();else document.addEventListener('pointerdown',outsideMenu,{once:true});}

function renderLegend(){
  const l=document.getElementById('legend');
  l.innerHTML='<span class="li"><i style="background:var(--running)"></i>running</span><span class="li"><i style="background:#ffb454"></i>stalled</span><span class="li"><i style="background:var(--attention)"></i>needs you</span><span class="li"><i style="background:var(--danger)"></i>failed</span>';
}
function render(){
  renderAttention();renderLegend();
  renderBoard();
}
function updateLiveBits(){
  document.querySelectorAll('[data-elapsed]').forEach(n=>{const t=byId(n.dataset.elapsed);if(t&&t.runStartedAt)n.textContent=elapsed(t.runStartedAt);});
  document.querySelectorAll('[data-stale]').forEach(n=>{const t=byId(n.dataset.stale);if(t&&t.lastHeartbeatAt)n.textContent=elapsed(t.lastHeartbeatAt);});
  if(openTaskId&&document.getElementById('drawer').classList.contains('open')){
    const t=byId(openTaskId); if(t&&t.status==='running')renderDrawer();
  }
}
function bindGlobal(){
  document.getElementById('scrim').onclick=closeTask;
  document.getElementById('drawer').addEventListener('click',e=>{
    const tab=e.target.closest('[data-tab]'); if(tab){activeTab=tab.dataset.tab;renderDrawer();return;}
    const dep=e.target.closest('[data-open-task]'); if(dep){openTask(dep.dataset.openTask);return;}
    const act=e.target.closest('[data-act]'); if(act){doAction(act.dataset.act,e);return;}
    const ev=e.target.closest('.ev'); if(ev){const p=ev.querySelector('.ev-payload'); if(p)p.classList.toggle('show');}
  });
  const si=document.getElementById('searchInput');
  if(si)si.addEventListener('input',e=>{filters.search=e.target.value.trim();render();});
  const td=document.getElementById('tenantDrop');
  if(td)td.addEventListener('click',e=>{
    const vals=['all'].concat(Array.from(new Set(TASKS.map(t=>t.tenant).filter(Boolean))).sort());
    openMenu(e.currentTarget,'Filter tenant',vals.map(v=>({icon:v==='all'?'*':'•',title:v,sub:v==='all'?'show every tenant':'only '+v,checked:filters.tenant===v,onClick:()=>{filters.tenant=v;render();}})));
  });
  const ad=document.getElementById('assigneeDrop');
  if(ad)ad.addEventListener('click',e=>{
    const vals=['all'].concat(Array.from(new Set(TASKS.map(t=>t.assignee).filter(Boolean))).sort());
    openMenu(e.currentTarget,'Filter assignee',vals.map(v=>({icon:v==='all'?'*':initials(v),title:v,sub:v==='all'?'show every worker':'only '+v,checked:filters.assignee===v,onClick:()=>{filters.assignee=v;render();}})));
  });
  window.addEventListener('keydown',e=>{if(e.key==='Escape'){if(document.querySelector('.pop-menu'))closeMenus();else if(openTaskId)closeTask();}});
}

bindGlobal();
render();
setInterval(updateLiveBits,1000);
</script>
</body>
</html>
