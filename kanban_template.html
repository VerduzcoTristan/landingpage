<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kanban — devmclovin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;450;500;600&display=swap" rel="stylesheet">
<style>
/* ============================================================
   TOKENS
   ============================================================ */
:root{
  --bg:#0b0d12;
  --surface:#11141b;
  --surface-2:#161a23;
  --surface-3:#1c212c;
  --surface-4:#232936;
  --border:#242b38;
  --border-2:#303849;
  --border-strong:#3c465a;

  --text:#e9ebf1;
  --text-2:#a6adbe;
  --text-3:#727a8d;
  --text-faint:#525a6c;

  --accent:#f5b13d;        /* hermes gold — the "alive/working" signature */
  --accent-bright:#ffc861;
  --accent-soft:rgba(245,177,61,.13);
  --accent-line:rgba(245,177,61,.32);

  /* state hues */
  --triage:#b794f6;     --triage-soft:rgba(183,148,246,.13);
  --todo:#8893a8;       --todo-soft:rgba(136,147,168,.12);
  --scheduled:#8b9cf0;  --scheduled-soft:rgba(139,156,240,.13);
  --ready:#2dd4bf;      --ready-soft:rgba(45,212,191,.12);
  --running:#f5b13d;    --running-soft:rgba(245,177,61,.13);
  --review:#e879b9;     --review-soft:rgba(232,121,185,.13);
  --blocked:#f2555a;    --blocked-soft:rgba(242,85,90,.13);
  --done:#43c08a;       --done-soft:rgba(67,192,138,.12);

  --attention:#ff7849;  --attention-soft:rgba(255,120,73,.14);
  --danger:#f2555a;     --danger-soft:rgba(242,85,90,.13);
  --ok:#43c08a;

  --mono:'JetBrains Mono',ui-monospace,SFMono-Regular,Menlo,monospace;
  --disp:'Space Grotesk','Inter',system-ui,sans-serif;
  --body:'Inter',system-ui,-apple-system,'Segoe UI',sans-serif;

  --r-sm:7px; --r:10px; --r-lg:14px; --r-xl:18px;
  --shadow:0 1px 2px rgba(0,0,0,.4);
  --shadow-lg:0 24px 60px -16px rgba(0,0,0,.7),0 8px 24px -8px rgba(0,0,0,.5);
  --drawer-w:600px;
}

*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  background:var(--bg);
  color:var(--text);
  font-family:var(--body);
  font-size:14px;
  line-height:1.5;
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
  overflow:hidden;
}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,textarea{font-family:inherit}
::selection{background:var(--accent-soft);color:var(--accent-bright)}
:focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:4px}

/* subtle scrollbars */
*::-webkit-scrollbar{width:10px;height:10px}
*::-webkit-scrollbar-track{background:transparent}
*::-webkit-scrollbar-thumb{background:var(--border-2);border-radius:20px;border:2px solid transparent;background-clip:padding-box}
*::-webkit-scrollbar-thumb:hover{background:var(--border-strong);background-clip:padding-box;border:2px solid transparent}

/* ============================================================
   APP SHELL
   ============================================================ */
.app{height:100vh;display:flex;flex-direction:column}

/* ---- Top bar ---- */
.topbar{
  display:flex;align-items:center;gap:18px;
  padding:0 20px;height:60px;flex:0 0 auto;
  background:linear-gradient(180deg,var(--surface) 0%,rgba(17,20,27,.6) 100%);
  border-bottom:1px solid var(--border);
  position:relative;z-index:30;
}
.brand{display:flex;align-items:center;gap:11px;flex:0 0 auto}
.brand-mark{
  width:30px;height:30px;border-radius:8px;flex:0 0 auto;
  background:radial-gradient(120% 120% at 30% 20%,#ffd98a,var(--accent) 55%,#c9831a);
  display:grid;place-items:center;color:#1a1205;font-weight:700;font-family:var(--disp);
  box-shadow:0 0 0 1px rgba(255,255,255,.12) inset,0 4px 12px -2px rgba(245,177,61,.5);
}
.brand-mark svg{width:17px;height:17px}
.brand-txt{display:flex;flex-direction:column;line-height:1.05}
.brand-txt b{font-family:var(--disp);font-weight:600;font-size:15px;letter-spacing:-.01em}
.brand-txt span{font-family:var(--mono);font-size:10px;color:var(--text-3);letter-spacing:.04em}

.board-switch{
  display:flex;align-items:center;gap:9px;padding:7px 12px;border-radius:var(--r);
  background:var(--surface-2);border:1px solid var(--border-2);cursor:pointer;
  transition:border-color .15s,background .15s;
}
.board-switch:hover{border-color:var(--border-strong);background:var(--surface-3)}
.board-switch .bicon{font-size:15px}
.board-switch b{font-family:var(--disp);font-weight:500;font-size:13.5px}
.board-switch .bcount{font-family:var(--mono);font-size:11px;color:var(--text-3);
  padding:1px 6px;border-radius:20px;background:var(--surface-4)}
.board-switch .chev{color:var(--text-3);font-size:11px;margin-left:1px}

.topbar-spacer{flex:1 1 auto}

/* segmented view toggle */
.viewtoggle{display:flex;background:var(--surface-2);border:1px solid var(--border-2);
  border-radius:var(--r);padding:3px;gap:2px}
.viewtoggle button{
  display:flex;align-items:center;gap:7px;padding:6px 13px;border-radius:7px;
  font-family:var(--mono);font-size:12px;font-weight:500;color:var(--text-3);
  transition:color .15s,background .15s;
}
.viewtoggle button svg{width:14px;height:14px}
.viewtoggle button.on{background:var(--surface-4);color:var(--text)}
.viewtoggle button:not(.on):hover{color:var(--text-2)}

/* orchestration pill */
.orch{display:flex;align-items:center;gap:8px;padding:6px 12px 6px 11px;border-radius:20px;
  background:var(--surface-2);border:1px solid var(--border-2);cursor:pointer;
  font-family:var(--mono);font-size:11.5px;transition:border-color .15s}
.orch:hover{border-color:var(--border-strong)}
.orch .dot{width:7px;height:7px;border-radius:50%}
.orch.auto .dot{background:var(--done);box-shadow:0 0 0 3px var(--done-soft)}
.orch.manual .dot{background:var(--text-3);box-shadow:0 0 0 3px rgba(136,147,168,.12)}
.orch .lbl{color:var(--text-3)}
.orch .val{color:var(--text);font-weight:600}
.orch.auto .val{color:var(--done)}

.iconbtn{width:36px;height:36px;border-radius:var(--r);background:var(--surface-2);
  border:1px solid var(--border-2);display:grid;place-items:center;color:var(--text-2);
  transition:all .15s}
.iconbtn:hover{border-color:var(--border-strong);background:var(--surface-3);color:var(--text)}
.iconbtn svg{width:17px;height:17px}

.nudge{display:flex;align-items:center;gap:8px;padding:8px 14px;border-radius:var(--r);
  background:var(--accent);color:#1a1205;font-family:var(--mono);font-weight:600;font-size:12px;
  transition:filter .15s,transform .05s;box-shadow:0 4px 14px -4px rgba(245,177,61,.5)}
.nudge:hover{filter:brightness(1.07)}
.nudge:active{transform:translateY(1px)}
.nudge svg{width:15px;height:15px}

/* ---- Filter bar ---- */
.filterbar{display:flex;align-items:center;gap:12px;padding:11px 20px;flex:0 0 auto;
  border-bottom:1px solid var(--border);background:var(--bg);position:relative;z-index:20}
.search{position:relative;flex:0 0 270px;max-width:270px}
.search svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);
  width:15px;height:15px;color:var(--text-3)}
.search input{width:100%;padding:8px 11px 8px 33px;border-radius:var(--r);
  background:var(--surface-2);border:1px solid var(--border-2);color:var(--text);
  font-size:13px;transition:border-color .15s}
.search input::placeholder{color:var(--text-faint)}
.search input:focus{outline:none;border-color:var(--accent-line);background:var(--surface-3)}

.fdrop{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:var(--r);
  background:var(--surface-2);border:1px solid var(--border-2);font-size:12.5px;color:var(--text-2);
  cursor:pointer;transition:border-color .15s;font-family:var(--mono)}
.fdrop:hover{border-color:var(--border-strong)}
.fdrop .fk{color:var(--text-faint);font-size:11px}
.fdrop .chev{color:var(--text-3);font-size:10px}
.filterbar-spacer{flex:1 1 auto}
.legend{display:flex;align-items:center;gap:14px;font-family:var(--mono);font-size:10.5px;
  color:var(--text-3);flex-wrap:wrap;justify-content:flex-end}
.legend .li{display:flex;align-items:center;gap:5px;white-space:nowrap}
.legend .li i{width:7px;height:7px;border-radius:2px;display:inline-block}

/* ============================================================
   ATTENTION STRIP  (fleet status readout)
   ============================================================ */
.attention{display:flex;align-items:stretch;gap:0;padding:10px 20px;flex:0 0 auto;
  background:linear-gradient(180deg,rgba(17,20,27,.5),transparent);
  border-bottom:1px solid var(--border);overflow-x:auto}
.att-title{display:flex;flex-direction:column;justify-content:center;padding-right:18px;
  margin-right:18px;border-right:1px solid var(--border);flex:0 0 auto}
.att-title b{font-family:var(--disp);font-size:12px;font-weight:600;letter-spacing:.02em}
.att-title span{font-family:var(--mono);font-size:10px;color:var(--text-3)}
.att-cards{display:flex;gap:10px;flex:1 1 auto}
.att{display:flex;align-items:center;gap:11px;padding:7px 15px 7px 12px;border-radius:var(--r);
  background:var(--surface-2);border:1px solid var(--border-2);cursor:pointer;flex:0 0 auto;
  transition:all .15s;min-width:0}
.att:hover{border-color:var(--border-strong);transform:translateY(-1px)}
.att.active{border-color:var(--accent-line);background:var(--accent-soft)}
.att .ico{width:30px;height:30px;border-radius:8px;display:grid;place-items:center;flex:0 0 auto}
.att .ico svg{width:16px;height:16px}
.att .meta{display:flex;flex-direction:column;line-height:1.15;min-width:0}
.att .n{font-family:var(--disp);font-size:18px;font-weight:600;font-variant-numeric:tabular-nums}
.att .k{font-family:var(--mono);font-size:10.5px;color:var(--text-3);white-space:nowrap}
.att.need .ico{background:var(--attention-soft);color:var(--attention)}
.att.need .n{color:var(--attention)}
.att.run .ico{background:var(--running-soft);color:var(--running)}
.att.stall .ico{background:var(--attention-soft);color:#ffb454}
.att.stall .n{color:#ffb454}
.att.fail .ico{background:var(--danger-soft);color:var(--danger)}
.att.fail .n{color:var(--danger)}
.att.done .ico{background:var(--done-soft);color:var(--done)}
.att-reset{display:flex;align-items:center;gap:6px;margin-left:auto;padding:0 14px;
  font-family:var(--mono);font-size:11px;color:var(--text-3);align-self:center;flex:0 0 auto}
.att-reset button{color:var(--accent);font-family:var(--mono);font-size:11px;font-weight:600;
  text-decoration:underline;text-underline-offset:2px}

/* ============================================================
   BOARD
   ============================================================ */
.scroll-area{flex:1 1 auto;overflow:hidden;position:relative}
.board{height:100%;display:flex;gap:14px;padding:16px 20px 20px;overflow-x:auto;overflow-y:hidden}

.col{flex:0 0 304px;width:304px;display:flex;flex-direction:column;min-height:0;
  border-radius:var(--r-lg);background:var(--surface);border:1px solid var(--border);
  transition:border-color .15s,background .15s}
.col.drag-over{border-color:var(--accent-line);background:var(--surface-2)}
.col-head{display:flex;align-items:center;gap:9px;padding:13px 14px 11px;flex:0 0 auto}
.col-dot{width:9px;height:9px;border-radius:3px;flex:0 0 auto}
.col-name{font-family:var(--disp);font-size:13px;font-weight:600;letter-spacing:.01em;flex:1 1 auto}
.col-count{font-family:var(--mono);font-size:11px;color:var(--text-3);
  background:var(--surface-3);padding:1px 7px;border-radius:20px;min-width:22px;text-align:center}
.col-add{width:24px;height:24px;border-radius:6px;display:grid;place-items:center;
  color:var(--text-3);transition:all .15s}
.col-add:hover{background:var(--surface-3);color:var(--text)}
.col-add svg{width:14px;height:14px}
.col-blurb{font-family:var(--mono);font-size:10px;color:var(--text-faint);padding:0 14px 10px;
  line-height:1.4;border-bottom:1px solid var(--border)}
.col-body{flex:1 1 auto;overflow-y:auto;padding:11px 11px 30px;display:flex;flex-direction:column;gap:10px}
.col-empty{text-align:center;padding:26px 10px;font-family:var(--mono);font-size:11px;
  color:var(--text-faint);border:1px dashed var(--border-2);border-radius:var(--r);margin-top:2px}

/* ---- CARD ---- */
.card{position:relative;background:var(--surface-2);border:1px solid var(--border-2);
  border-radius:var(--r);padding:11px 12px 10px;cursor:pointer;
  transition:border-color .15s,transform .08s,box-shadow .15s,opacity .2s;
  border-left-width:3px}
.card:hover{border-color:var(--border-strong);transform:translateY(-1px);box-shadow:var(--shadow)}
.card:active{cursor:grabbing}
.card.dragging{opacity:.4}
.card.dimmed{opacity:.32;filter:saturate(.5)}
.card.pop{box-shadow:0 0 0 1px var(--accent-line),0 0 22px -4px var(--accent-soft)}

.card-top{display:flex;align-items:center;gap:7px;margin-bottom:7px}
.card-id{font-family:var(--mono);font-size:10.5px;color:var(--text-faint);letter-spacing:.01em}
.card-top-spacer{flex:1 1 auto}
.prio{font-family:var(--mono);font-size:9.5px;font-weight:700;padding:1px 5px;border-radius:4px;
  letter-spacing:.03em}
.prio.p1{color:#ff9a6c;background:rgba(255,120,73,.14)}
.prio.p2{color:var(--accent);background:var(--accent-soft)}
.prio.p3{color:var(--blocked);background:var(--blocked-soft)}
.tenant{font-family:var(--mono);font-size:9.5px;color:var(--text-3);padding:1px 6px;border-radius:4px;
  background:var(--surface-4);max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

.card-title{font-family:var(--body);font-size:13.5px;font-weight:500;line-height:1.35;color:var(--text);
  margin-bottom:9px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}

/* the status line — the key at-a-glance signal */
.statusline{display:flex;align-items:flex-start;gap:7px;padding:6px 8px;border-radius:7px;
  font-size:11.5px;line-height:1.35;margin-bottom:9px;background:var(--surface-3)}
.statusline .sico{flex:0 0 auto;margin-top:1px;display:grid;place-items:center}
.statusline .sico svg{width:13px;height:13px;display:block}
.statusline .stext{min-width:0;color:var(--text-2)}
.statusline .stext b{color:var(--text);font-weight:600;font-family:var(--mono);font-size:11px}
.statusline .hb{display:block;color:var(--text-3);font-family:var(--mono);font-size:10.5px;
  margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.statusline .quote{color:var(--text-2);font-style:normal;display:-webkit-box;-webkit-line-clamp:2;
  -webkit-box-orient:vertical;overflow:hidden}

.statusline.run{background:var(--running-soft)}
.statusline.run .sico{color:var(--running)}
.statusline.stale{background:var(--attention-soft)}
.statusline.stale .sico{color:#ffb454}
.statusline.need{background:var(--attention-soft)}
.statusline.need .sico{color:var(--attention)}
.statusline.fail{background:var(--danger-soft)}
.statusline.fail .sico{color:var(--danger)}
.statusline.review{background:var(--review-soft)}
.statusline.review .sico{color:var(--review)}
.statusline.done{background:var(--done-soft)}
.statusline.done .sico{color:var(--done)}
.statusline.ready{background:var(--ready-soft)}
.statusline.ready .sico{color:var(--ready)}
.statusline.sched{background:var(--scheduled-soft)}
.statusline.sched .sico{color:var(--scheduled)}
.statusline.wait .sico{color:var(--text-3)}
.statusline.triage{background:var(--triage-soft)}
.statusline.triage .sico{color:var(--triage)}

/* live timer monospace */
.tnum{font-variant-numeric:tabular-nums;font-family:var(--mono)}

/* heartbeat pulse */
.pulse{position:relative;width:9px;height:9px;flex:0 0 auto}
.pulse i{position:absolute;inset:0;border-radius:50%;background:var(--running)}
.pulse::before{content:"";position:absolute;inset:0;border-radius:50%;background:var(--running);
  animation:ping 1.6s cubic-bezier(0,0,.2,1) infinite}
@keyframes ping{0%{transform:scale(1);opacity:.55}70%,100%{transform:scale(2.6);opacity:0}}
.statusline.flash{animation:flashbg .9s ease}
@keyframes flashbg{0%{background:rgba(245,177,61,.32)}100%{background:var(--running-soft)}}

.card-foot{display:flex;align-items:center;gap:8px;margin-top:2px}
.assignee{display:flex;align-items:center;gap:6px;min-width:0}
.avatar{width:18px;height:18px;border-radius:5px;flex:0 0 auto;display:grid;place-items:center;
  font-family:var(--mono);font-size:8.5px;font-weight:700;color:#0b0d12}
.assignee .an{font-family:var(--mono);font-size:11px;color:var(--text-2);overflow:hidden;
  text-overflow:ellipsis;white-space:nowrap}
.assignee .unassigned{color:var(--text-faint);font-style:italic}
.card-foot-spacer{flex:1 1 auto}
.fchip{display:flex;align-items:center;gap:3px;font-family:var(--mono);font-size:10px;color:var(--text-3)}
.fchip svg{width:12px;height:12px}
.attempt{color:var(--attention);font-weight:600}
.progress-pill{display:flex;align-items:center;gap:5px;font-family:var(--mono);font-size:10px;
  color:var(--text-3)}
.progress-pill .bar{width:26px;height:4px;border-radius:3px;background:var(--surface-4);overflow:hidden}
.progress-pill .bar i{display:block;height:100%;background:var(--done);border-radius:3px}

.card-ago{font-family:var(--mono);font-size:10px;color:var(--text-faint)}

/* attention glow for cards needing the human */
.card.glow-need{border-left-color:var(--attention);
  box-shadow:0 0 0 1px rgba(255,120,73,.25),0 6px 20px -8px rgba(255,120,73,.35)}
.card.glow-fail{border-left-color:var(--danger)}
.card.glow-stale{border-left-color:#ffb454}

/* ============================================================
   WORKERS / ACTIVITY VIEW
   ============================================================ */
.workers{height:100%;overflow-y:auto;padding:18px 20px 40px}
.workers-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(440px,1fr));gap:14px;max-width:1500px}
.wlane{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden}
.wlane-head{display:flex;align-items:center;gap:11px;padding:14px 16px;border-bottom:1px solid var(--border)}
.wlane-head .avatar{width:30px;height:30px;border-radius:8px;font-size:12px}
.wlane-id{flex:1 1 auto;min-width:0}
.wlane-id b{font-family:var(--mono);font-size:13.5px;font-weight:600;display:block}
.wlane-id span{font-family:var(--mono);font-size:10.5px;color:var(--text-3)}
.wstatus{font-family:var(--mono);font-size:10.5px;font-weight:600;padding:4px 10px;border-radius:20px;
  display:flex;align-items:center;gap:6px}
.wstatus.working{color:var(--running);background:var(--running-soft)}
.wstatus.stalled{color:#ffb454;background:var(--attention-soft)}
.wstatus.idle{color:var(--text-3);background:var(--surface-3)}
.wstatus.blocked{color:var(--attention);background:var(--attention-soft)}
.wlane-body{padding:14px 16px}
.wlane-now{background:var(--surface-2);border:1px solid var(--border-2);border-radius:var(--r);
  padding:11px 13px;cursor:pointer;transition:border-color .15s;border-left:3px solid var(--running)}
.wlane-now:hover{border-color:var(--border-strong)}
.wlane-now.stale{border-left-color:#ffb454}
.wlane-now .nlabel{font-family:var(--mono);font-size:10px;color:var(--text-3);
  display:flex;align-items:center;gap:7px;margin-bottom:6px}
.wlane-now .ntitle{font-size:13px;font-weight:500;line-height:1.35;margin-bottom:7px}
.wlane-now .nhb{font-family:var(--mono);font-size:11px;color:var(--text-2);
  display:flex;align-items:center;gap:7px}
.wlane-now .nhb .sico{color:var(--running)}
.wlane-now .nhb .sico svg{width:13px;height:13px;display:block}
.wlane-idle{padding:16px;text-align:center;font-family:var(--mono);font-size:11.5px;color:var(--text-faint);
  border:1px dashed var(--border-2);border-radius:var(--r)}
.wlane-stats{display:flex;gap:8px;margin-top:12px}
.wstat{flex:1 1 0;background:var(--surface-2);border:1px solid var(--border);border-radius:var(--r-sm);
  padding:9px 11px;text-align:left}
.wstat .v{font-family:var(--disp);font-size:18px;font-weight:600;font-variant-numeric:tabular-nums;line-height:1}
.wstat .l{font-family:var(--mono);font-size:9.5px;color:var(--text-3);margin-top:4px}
.wstat.q .v{color:var(--ready)}
.wstat.d .v{color:var(--done)}
.wstat.b .v{color:var(--attention)}
.workers-head{display:flex;align-items:baseline;gap:12px;margin-bottom:16px}
.workers-head h2{font-family:var(--disp);font-size:20px;font-weight:600;letter-spacing:-.01em}
.workers-head p{font-family:var(--mono);font-size:11.5px;color:var(--text-3)}

/* ============================================================
   DRAWER
   ============================================================ */
.scrim{position:fixed;inset:0;background:rgba(6,8,12,.6);backdrop-filter:blur(2px);
  opacity:0;pointer-events:none;transition:opacity .25s;z-index:40}
.scrim.open{opacity:1;pointer-events:auto}
.drawer{position:fixed;top:0;right:0;bottom:0;width:var(--drawer-w);max-width:94vw;
  background:var(--surface);border-left:1px solid var(--border-2);z-index:50;
  transform:translateX(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);
  display:flex;flex-direction:column;box-shadow:var(--shadow-lg)}
.drawer.open{transform:translateX(0)}

.dr-top{display:flex;align-items:flex-start;gap:12px;padding:18px 20px 14px;flex:0 0 auto;
  border-bottom:1px solid var(--border)}
.dr-top-main{flex:1 1 auto;min-width:0}
.dr-idrow{display:flex;align-items:center;gap:9px;margin-bottom:9px;flex-wrap:wrap}
.dr-id{font-family:var(--mono);font-size:11px;color:var(--text-3);padding:2px 7px;border-radius:5px;
  background:var(--surface-3)}
.dr-title{font-family:var(--disp);font-size:19px;font-weight:600;line-height:1.25;letter-spacing:-.01em;color:var(--text)}
.dr-close{width:32px;height:32px;border-radius:8px;flex:0 0 auto;display:grid;place-items:center;
  color:var(--text-3);transition:all .15s}
.dr-close:hover{background:var(--surface-3);color:var(--text)}
.dr-close svg{width:18px;height:18px}

/* HERO status banner */
.hero{margin:14px 20px 0;border-radius:var(--r-lg);padding:15px 16px;flex:0 0 auto;
  border:1px solid var(--border-2);position:relative;overflow:hidden}
.hero::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px}
.hero-row{display:flex;align-items:flex-start;gap:13px}
.hero-ico{width:40px;height:40px;border-radius:11px;flex:0 0 auto;display:grid;place-items:center}
.hero-ico svg{width:21px;height:21px}
.hero-main{flex:1 1 auto;min-width:0}
.hero-eyebrow{font-family:var(--mono);font-size:10.5px;font-weight:600;letter-spacing:.06em;
  text-transform:uppercase;margin-bottom:3px}
.hero-headline{font-family:var(--disp);font-size:17px;font-weight:600;line-height:1.25;color:var(--text)}
.hero-sub{font-size:12.5px;color:var(--text-2);margin-top:5px;line-height:1.45}
.hero-sub .q{color:var(--text);background:var(--surface-3);padding:1px 6px;border-radius:5px;
  font-family:var(--mono);font-size:11.5px}
.hero-metrics{display:flex;gap:18px;margin-top:11px}
.hero-metric{display:flex;flex-direction:column;gap:1px}
.hero-metric .mv{font-family:var(--disp);font-size:16px;font-weight:600;font-variant-numeric:tabular-nums;line-height:1}
.hero-metric .ml{font-family:var(--mono);font-size:9.5px;color:var(--text-3)}
.hero-actions{display:flex;gap:8px;margin-top:13px;flex-wrap:wrap}

.hero.h-run::before{background:var(--running)}
.hero.h-run{background:linear-gradient(110deg,var(--running-soft),transparent 70%)}
.hero.h-run .hero-ico{background:var(--running-soft);color:var(--running)}
.hero.h-run .hero-eyebrow{color:var(--running)}
.hero.h-stale::before{background:#ffb454}
.hero.h-stale{background:linear-gradient(110deg,var(--attention-soft),transparent 70%)}
.hero.h-stale .hero-ico{background:var(--attention-soft);color:#ffb454}
.hero.h-stale .hero-eyebrow{color:#ffb454}
.hero.h-need::before{background:var(--attention)}
.hero.h-need{background:linear-gradient(110deg,var(--attention-soft),transparent 70%)}
.hero.h-need .hero-ico{background:var(--attention-soft);color:var(--attention)}
.hero.h-need .hero-eyebrow{color:var(--attention)}
.hero.h-fail::before{background:var(--danger)}
.hero.h-fail{background:linear-gradient(110deg,var(--danger-soft),transparent 70%)}
.hero.h-fail .hero-ico{background:var(--danger-soft);color:var(--danger)}
.hero.h-fail .hero-eyebrow{color:var(--danger)}
.hero.h-review::before{background:var(--review)}
.hero.h-review{background:linear-gradient(110deg,var(--review-soft),transparent 70%)}
.hero.h-review .hero-ico{background:var(--review-soft);color:var(--review)}
.hero.h-review .hero-eyebrow{color:var(--review)}
.hero.h-done::before{background:var(--done)}
.hero.h-done{background:linear-gradient(110deg,var(--done-soft),transparent 70%)}
.hero.h-done .hero-ico{background:var(--done-soft);color:var(--done)}
.hero.h-done .hero-eyebrow{color:var(--done)}
.hero.h-ready::before{background:var(--ready)}
.hero.h-ready{background:linear-gradient(110deg,var(--ready-soft),transparent 70%)}
.hero.h-ready .hero-ico{background:var(--ready-soft);color:var(--ready)}
.hero.h-ready .hero-eyebrow{color:var(--ready)}
.hero.h-sched::before{background:var(--scheduled)}
.hero.h-sched{background:linear-gradient(110deg,var(--scheduled-soft),transparent 70%)}
.hero.h-sched .hero-ico{background:var(--scheduled-soft);color:var(--scheduled)}
.hero.h-sched .hero-eyebrow{color:var(--scheduled)}
.hero.h-wait::before{background:var(--todo)}
.hero.h-wait .hero-ico{background:var(--todo-soft);color:var(--todo)}
.hero.h-wait .hero-eyebrow{color:var(--todo)}
.hero.h-triage::before{background:var(--triage)}
.hero.h-triage{background:linear-gradient(110deg,var(--triage-soft),transparent 70%)}
.hero.h-triage .hero-ico{background:var(--triage-soft);color:var(--triage)}
.hero.h-triage .hero-eyebrow{color:var(--triage)}

/* buttons in hero/footer */
.btn{display:inline-flex;align-items:center;gap:7px;padding:8px 14px;border-radius:8px;
  font-family:var(--mono);font-size:12px;font-weight:600;transition:all .12s;
  border:1px solid transparent;white-space:nowrap}
.btn svg{width:14px;height:14px}
.btn-primary{background:var(--accent);color:#1a1205;box-shadow:0 3px 10px -3px rgba(245,177,61,.45)}
.btn-primary:hover{filter:brightness(1.08)}
.btn.b-need{background:var(--attention);color:#1a0d05;box-shadow:0 3px 10px -3px rgba(255,120,73,.45)}
.btn.b-review{background:var(--review);color:#1a0512;box-shadow:0 3px 10px -3px rgba(232,121,185,.4)}
.btn.b-done{background:var(--done);color:#04140d;box-shadow:0 3px 10px -3px rgba(67,192,138,.4)}
.btn.b-ready{background:var(--ready);color:#04140d}
.btn-ghost{background:var(--surface-3);color:var(--text-2);border-color:var(--border-2)}
.btn-ghost:hover{background:var(--surface-4);color:var(--text);border-color:var(--border-strong)}
.btn-danger-ghost{background:transparent;color:var(--text-3);border-color:var(--border-2)}
.btn-danger-ghost:hover{color:var(--danger);border-color:var(--danger);background:var(--danger-soft)}

/* TABS */
.tabs{display:flex;gap:2px;padding:13px 20px 0;flex:0 0 auto;border-bottom:1px solid var(--border)}
.tab{padding:9px 13px;font-family:var(--mono);font-size:12px;font-weight:500;color:var(--text-3);
  border-bottom:2px solid transparent;margin-bottom:-1px;transition:color .15s;display:flex;align-items:center;gap:6px}
.tab .cnt{font-size:10px;padding:0 5px;border-radius:20px;background:var(--surface-3);color:var(--text-3)}
.tab:hover{color:var(--text-2)}
.tab.on{color:var(--text);border-bottom-color:var(--accent)}
.tab.on .cnt{background:var(--accent-soft);color:var(--accent)}

.dr-body{flex:1 1 auto;overflow-y:auto;padding:18px 20px 28px}
.panel{display:none}
.panel.on{display:block;animation:fade .2s ease}
@keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

.sec{margin-bottom:22px}
.sec-h{font-family:var(--mono);font-size:10.5px;font-weight:600;letter-spacing:.07em;
  text-transform:uppercase;color:var(--text-3);margin-bottom:11px;display:flex;align-items:center;gap:8px}
.sec-h .hr{flex:1 1 auto;height:1px;background:var(--border)}
.sec-h .ed{color:var(--accent);text-transform:none;letter-spacing:0;font-weight:600;cursor:pointer}

/* description / markdown */
.md{font-size:13.5px;line-height:1.6;color:var(--text-2)}
.md p{margin-bottom:9px}.md p:last-child{margin-bottom:0}
.md strong{color:var(--text);font-weight:600}
.md code{font-family:var(--mono);font-size:12px;background:var(--surface-3);padding:1px 5px;
  border-radius:4px;color:var(--accent-bright)}
.md ul{margin:0 0 9px 2px;list-style:none}
.md li{position:relative;padding-left:18px;margin-bottom:4px}
.md li::before{content:"";position:absolute;left:4px;top:9px;width:4px;height:4px;border-radius:50%;
  background:var(--text-faint)}
.md a{color:var(--accent);text-decoration:underline;text-underline-offset:2px}
.md-empty{font-family:var(--mono);font-size:12px;color:var(--text-faint);font-style:italic}

/* dependency chips */
.deps{display:flex;flex-direction:column;gap:14px}
.dep-group .dgl{font-family:var(--mono);font-size:10px;color:var(--text-3);margin-bottom:7px}
.dep-chip{display:flex;align-items:center;gap:9px;padding:9px 11px;background:var(--surface-2);
  border:1px solid var(--border-2);border-radius:var(--r);cursor:pointer;transition:border-color .15s;margin-bottom:7px}
.dep-chip:hover{border-color:var(--border-strong)}
.dep-chip .ddot{width:8px;height:8px;border-radius:50%;flex:0 0 auto}
.dep-chip .did{font-family:var(--mono);font-size:10.5px;color:var(--text-faint);flex:0 0 auto}
.dep-chip .dtitle{font-size:12.5px;color:var(--text-2);flex:1 1 auto;overflow:hidden;
  text-overflow:ellipsis;white-space:nowrap}
.dep-chip .dstat{font-family:var(--mono);font-size:9.5px;font-weight:600;padding:1px 7px;border-radius:4px}
.dep-none{font-family:var(--mono);font-size:11.5px;color:var(--text-faint)}

/* attachments */
.attach{display:flex;align-items:center;gap:10px;padding:9px 11px;background:var(--surface-2);
  border:1px solid var(--border-2);border-radius:var(--r);margin-bottom:7px}
.attach svg{width:16px;height:16px;color:var(--text-3);flex:0 0 auto}
.attach .afn{font-family:var(--mono);font-size:12px;color:var(--text-2);flex:1 1 auto}
.attach .asz{font-family:var(--mono);font-size:10.5px;color:var(--text-faint)}

/* ---- RUN TIMELINE (the star) ---- */
.runs{display:flex;flex-direction:column;gap:0;position:relative}
.run{position:relative;padding-left:30px;padding-bottom:16px}
.run::before{content:"";position:absolute;left:9px;top:24px;bottom:-2px;width:2px;background:var(--border)}
.run:last-child::before{display:none}
.run-node{position:absolute;left:0;top:3px;width:20px;height:20px;border-radius:50%;
  display:grid;place-items:center;border:2px solid var(--bg);z-index:1}
.run-node svg{width:11px;height:11px}
.run-card{background:var(--surface-2);border:1px solid var(--border-2);border-radius:var(--r);overflow:hidden}
.run-card.active{border-color:var(--running-soft);box-shadow:0 0 0 1px var(--running-soft)}
.run-head{display:flex;align-items:center;gap:9px;padding:10px 12px;flex-wrap:wrap}
.run-attempt{font-family:var(--mono);font-size:11px;font-weight:600;color:var(--text)}
.run-outcome{font-family:var(--mono);font-size:9.5px;font-weight:700;padding:2px 7px;border-radius:5px;
  letter-spacing:.03em;display:flex;align-items:center;gap:4px}
.run-outcome svg{width:11px;height:11px}
.run-head-spacer{flex:1 1 auto}
.run-meta-inline{font-family:var(--mono);font-size:10px;color:var(--text-3);display:flex;align-items:center;gap:9px}
.run-meta-inline .rm{display:flex;align-items:center;gap:4px}
.run-body{padding:0 12px 12px}
.run-summary{font-size:13px;line-height:1.5;color:var(--text);padding:9px 11px;background:var(--surface-3);
  border-radius:7px;border-left:2px solid var(--border-strong)}
.run-summary.blocked-s{border-left-color:var(--attention);color:var(--text)}
.run-summary.error-s{border-left-color:var(--danger)}
.run-summary .rsl{font-family:var(--mono);font-size:9.5px;font-weight:600;letter-spacing:.04em;
  text-transform:uppercase;display:block;margin-bottom:4px}
.run-summary.blocked-s .rsl{color:var(--attention)}
.run-summary.error-s .rsl{color:var(--danger)}

/* rendered metadata */
.rmeta{margin-top:11px;display:flex;flex-direction:column;gap:11px}
.rmeta-block .rmh{font-family:var(--mono);font-size:9.5px;font-weight:600;letter-spacing:.05em;
  text-transform:uppercase;color:var(--text-3);margin-bottom:6px;display:flex;align-items:center;gap:6px}
.rmeta-block .rmh .c{color:var(--text-faint);font-weight:500}
.filechips{display:flex;flex-wrap:wrap;gap:5px}
.filechip{display:flex;align-items:center;gap:5px;font-family:var(--mono);font-size:10.5px;
  color:var(--text-2);background:var(--surface-3);border:1px solid var(--border-2);
  padding:3px 8px;border-radius:5px}
.filechip svg{width:11px;height:11px;color:var(--text-faint)}
.cmdchip{font-family:var(--mono);font-size:10.5px;color:var(--ready);background:rgba(45,212,191,.08);
  border:1px solid rgba(45,212,191,.2);padding:3px 8px;border-radius:5px;display:inline-flex;gap:6px}
.cmdchip .dollar{color:var(--text-faint)}
.rmeta-stats{display:flex;gap:18px;flex-wrap:wrap}
.rmeta-stat{display:flex;flex-direction:column;gap:1px}
.rmeta-stat .v{font-family:var(--disp);font-size:15px;font-weight:600;font-variant-numeric:tabular-nums;line-height:1}
.rmeta-stat .l{font-family:var(--mono);font-size:9px;color:var(--text-3)}
.rmeta-list{list-style:none;display:flex;flex-direction:column;gap:5px}
.rmeta-list li{position:relative;padding-left:16px;font-size:12px;color:var(--text-2);line-height:1.4}
.rmeta-list li::before{content:"";position:absolute;left:2px;top:7px;width:4px;height:4px;
  border-radius:50%;background:var(--accent)}
.rmeta-callout{font-size:12px;color:var(--text-2);background:var(--attention-soft);
  border:1px solid rgba(255,120,73,.2);border-radius:7px;padding:8px 10px;line-height:1.45}
.rmeta-kv{font-family:var(--mono);font-size:11px;color:var(--text-2)}
.rmeta-kv b{color:var(--text)}
.prlink{display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);font-size:11px;
  color:var(--accent);background:var(--accent-soft);border:1px solid var(--accent-line);
  padding:4px 10px;border-radius:6px}
.prlink svg{width:12px;height:12px}
.run-live{display:flex;align-items:center;gap:9px;padding:9px 11px;background:var(--running-soft);
  border-radius:7px;font-family:var(--mono);font-size:11.5px;color:var(--text-2)}
.run-live .sico{color:var(--running)}

/* ---- EVENT LOG ---- */
.events{position:relative;padding-left:6px}
.ev{display:flex;gap:11px;padding:7px 0;position:relative}
.ev-line{position:absolute;left:9px;top:0;bottom:0;width:1px;background:var(--border)}
.ev:first-child .ev-line{top:14px}.ev:last-child .ev-line{bottom:auto;height:14px}
.ev-dot{width:19px;height:19px;border-radius:50%;flex:0 0 auto;display:grid;place-items:center;
  background:var(--surface-3);border:1px solid var(--border-2);z-index:1;color:var(--text-3)}
.ev-dot svg{width:11px;height:11px}
.ev-main{flex:1 1 auto;min-width:0;padding-top:1px}
.ev-row{display:flex;align-items:baseline;gap:8px}
.ev-kind{font-family:var(--mono);font-size:11.5px;font-weight:600;color:var(--text)}
.ev-time{font-family:var(--mono);font-size:10px;color:var(--text-faint);margin-left:auto;flex:0 0 auto}
.ev-desc{font-size:12px;color:var(--text-3);margin-top:1px;line-height:1.4}
.ev-payload{font-family:var(--mono);font-size:10px;color:var(--text-faint);margin-top:3px;
  background:var(--surface-2);border:1px solid var(--border);border-radius:5px;padding:4px 7px;
  white-space:pre-wrap;word-break:break-word;display:none}
.ev-payload.show{display:block}
.ev-dot.c-completed{color:var(--done);border-color:var(--done-soft);background:var(--done-soft)}
.ev-dot.c-blocked,.ev-dot.c-gave_up{color:var(--danger);border-color:var(--danger-soft);background:var(--danger-soft)}
.ev-dot.c-spawned,.ev-dot.c-claimed{color:var(--running);border-color:var(--running-soft);background:var(--running-soft)}
.ev-dot.c-heartbeat{color:var(--accent);border-color:var(--accent-soft);background:var(--accent-soft)}
.ev-dot.c-crashed,.ev-dot.c-timed_out,.ev-dot.c-stale,.ev-dot.c-spawn_failed{color:#ffb454;border-color:var(--attention-soft);background:var(--attention-soft)}
.ev-dot.c-created{color:var(--triage);border-color:var(--triage-soft);background:var(--triage-soft)}
.ev-dot.c-unblocked,.ev-dot.c-promoted{color:var(--ready);border-color:var(--ready-soft);background:var(--ready-soft)}

/* ---- COMMENTS ---- */
.thread{display:flex;flex-direction:column;gap:14px;margin-bottom:18px}
.cmt{display:flex;gap:10px;max-width:90%}
.cmt.human{flex-direction:row-reverse;align-self:flex-end}
.cmt.system{align-self:center;max-width:100%}
.cmt .avatar{width:26px;height:26px;border-radius:7px;font-size:10px;flex:0 0 auto;margin-top:2px}
.cmt-bub{background:var(--surface-2);border:1px solid var(--border-2);border-radius:12px;padding:9px 12px}
.cmt.human .cmt-bub{background:var(--accent-soft);border-color:var(--accent-line)}
.cmt.system .cmt-bub{background:transparent;border-style:dashed;text-align:center}
.cmt-meta{display:flex;align-items:baseline;gap:8px;margin-bottom:3px}
.cmt.human .cmt-meta{flex-direction:row-reverse}
.cmt-author{font-family:var(--mono);font-size:11px;font-weight:600;color:var(--text)}
.cmt-time{font-family:var(--mono);font-size:9.5px;color:var(--text-faint)}
.cmt-text{font-size:13px;line-height:1.5;color:var(--text-2)}
.cmt.system .cmt-text{font-family:var(--mono);font-size:11px;color:var(--text-3)}
.composer{display:flex;gap:9px;align-items:flex-end;padding-top:4px;border-top:1px solid var(--border);
  margin-top:4px;padding-top:14px}
.composer textarea{flex:1 1 auto;resize:none;background:var(--surface-2);border:1px solid var(--border-2);
  border-radius:var(--r);padding:10px 12px;color:var(--text);font-size:13px;font-family:var(--body);
  min-height:42px;max-height:120px;line-height:1.45}
.composer textarea:focus{outline:none;border-color:var(--accent-line)}
.composer textarea::placeholder{color:var(--text-faint)}
.send{width:42px;height:42px;border-radius:var(--r);background:var(--accent);color:#1a1205;
  display:grid;place-items:center;flex:0 0 auto;transition:filter .15s}
.send:hover{filter:brightness(1.08)}
.send svg{width:18px;height:18px}

/* ---- LOGS ---- */
.logbar{display:flex;align-items:center;gap:9px;margin-bottom:10px}
.logbar .lt{font-family:var(--mono);font-size:11px;color:var(--text-3);flex:1 1 auto}
.logbtn{font-family:var(--mono);font-size:10.5px;color:var(--text-2);padding:5px 10px;border-radius:6px;
  background:var(--surface-3);border:1px solid var(--border-2);display:flex;align-items:center;gap:6px}
.logbtn:hover{border-color:var(--border-strong);color:var(--text)}
.logbtn svg{width:12px;height:12px}
.logwrap{background:#08090d;border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.logwrap pre{margin:0;padding:13px 15px;font-family:var(--mono);font-size:11px;line-height:1.6;
  color:var(--text-2);overflow-x:auto;white-space:pre;max-height:420px;overflow-y:auto}
.log-l{color:var(--text-3)}
.log-info{color:var(--ready)}
.log-warn{color:#ffb454}
.log-err{color:var(--danger)}
.log-ok{color:var(--done)}
.log-dim{color:var(--text-faint)}
.log-ts{color:var(--text-faint)}
.log-empty{font-family:var(--mono);font-size:11.5px;color:var(--text-faint);padding:24px;text-align:center;
  border:1px dashed var(--border-2);border-radius:var(--r)}

/* ---- DETAILS GRID ---- */
.dgrid{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--border);
  border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.dcell{background:var(--surface);padding:11px 13px}
.dcell.full{grid-column:1/-1}
.dcell .dk{font-family:var(--mono);font-size:9.5px;color:var(--text-3);margin-bottom:4px;letter-spacing:.03em}
.dcell .dv{font-family:var(--mono);font-size:12px;color:var(--text);word-break:break-word}
.dcell .dv.dim{color:var(--text-faint);font-style:italic}
.skilltag{display:inline-block;font-family:var(--mono);font-size:10px;color:var(--accent);
  background:var(--accent-soft);border:1px solid var(--accent-line);padding:1px 7px;border-radius:5px;margin:2px 3px 0 0}

/* footer actions in drawer */
.dr-foot{flex:0 0 auto;border-top:1px solid var(--border);padding:12px 20px;display:flex;
  align-items:center;gap:8px;background:var(--surface);flex-wrap:wrap}
.dr-foot .spacer{flex:1 1 auto}

/* ---- TOAST ---- */
.toasts{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:80;
  display:flex;flex-direction:column;gap:8px;align-items:center}
.toast{display:flex;align-items:center;gap:11px;padding:11px 14px;border-radius:var(--r);
  background:var(--surface-4);border:1px solid var(--border-strong);box-shadow:var(--shadow-lg);
  font-size:13px;color:var(--text);animation:toastin .3s cubic-bezier(.2,.9,.3,1);min-width:280px;max-width:440px}
.toast .tic{width:26px;height:26px;border-radius:7px;display:grid;place-items:center;flex:0 0 auto}
.toast .tic svg{width:15px;height:15px}
.toast.ok .tic{background:var(--done-soft);color:var(--done)}
.toast.info .tic{background:var(--accent-soft);color:var(--accent)}
.toast.warn .tic{background:var(--attention-soft);color:var(--attention)}
.toast .tmsg{flex:1 1 auto;line-height:1.35}
.toast .tmsg b{font-family:var(--mono);font-size:12px}
.toast .tundo{font-family:var(--mono);font-size:11.5px;font-weight:600;color:var(--accent);
  padding:4px 9px;border-radius:6px;flex:0 0 auto}
.toast .tundo:hover{background:var(--accent-soft)}
@keyframes toastin{from{opacity:0;transform:translateY(14px) scale(.96)}to{opacity:1;transform:none}}
.toast.out{animation:toastout .25s ease forwards}
@keyframes toastout{to{opacity:0;transform:translateY(10px) scale(.97)}}

/* tiny popover menus (board switch / orchestration) */
.pop-menu{position:fixed;z-index:90;background:var(--surface-3);border:1px solid var(--border-strong);
  border-radius:var(--r);box-shadow:var(--shadow-lg);padding:6px;min-width:230px;
  animation:fade .15s ease}
.pop-menu .pm-h{font-family:var(--mono);font-size:9.5px;color:var(--text-3);padding:6px 9px 8px;letter-spacing:.05em}
.pm-item{display:flex;align-items:center;gap:10px;padding:9px 9px;border-radius:7px;cursor:pointer;width:100%;text-align:left}
.pm-item:hover{background:var(--surface-4)}
.pm-item .pmi{width:26px;height:26px;border-radius:7px;display:grid;place-items:center;flex:0 0 auto;font-size:14px}
.pm-item .pmt{flex:1 1 auto}
.pm-item .pmt b{font-family:var(--disp);font-size:13px;font-weight:500;display:block}
.pm-item .pmt span{font-family:var(--mono);font-size:10px;color:var(--text-3)}
.pm-item .pmc{color:var(--done);flex:0 0 auto}
.pm-item .pmc svg{width:15px;height:15px}
.pm-sep{height:1px;background:var(--border);margin:5px 4px}

/* inline create */
.createform{background:var(--surface-2);border:1px solid var(--accent-line);border-radius:var(--r);
  padding:10px;margin-bottom:10px;display:flex;flex-direction:column;gap:8px}
.createform input{background:var(--surface);border:1px solid var(--border-2);border-radius:7px;
  padding:8px 10px;color:var(--text);font-size:13px}
.createform input:focus{outline:none;border-color:var(--accent-line)}
.createform .cf-row{display:flex;gap:7px}
.createform .cf-row input{flex:1 1 auto;font-family:var(--mono);font-size:11px}
.createform .cf-actions{display:flex;gap:7px;justify-content:flex-end}
.cf-btn{font-family:var(--mono);font-size:11px;font-weight:600;padding:6px 12px;border-radius:6px}
.cf-btn.go{background:var(--accent);color:#1a1205}
.cf-btn.cancel{background:var(--surface-3);color:var(--text-3)}

/* empty state for board search */
.board-empty{position:absolute;inset:0;display:grid;place-items:center;pointer-events:none}
.board-empty-card{text-align:center;font-family:var(--mono);color:var(--text-3);
  background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:30px 40px}
.board-empty-card svg{width:34px;height:34px;color:var(--text-faint);margin-bottom:12px}
.board-empty-card b{font-family:var(--disp);font-size:15px;color:var(--text-2);display:block;margin-bottom:5px}

/* reduced motion */
@media (prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:.001ms!important;animation-iteration-count:1!important;
    transition-duration:.05ms!important}
  .pulse::before{display:none}
}

/* responsive */
@media (max-width:760px){
  .topbar{height:auto;flex-wrap:wrap;padding:10px 14px;gap:10px}
  .brand-txt{display:none}
  .topbar-spacer{display:none}
  .orch .lbl{display:none}
  .filterbar{flex-wrap:wrap;padding:10px 14px}
  .search{flex:1 1 100%;max-width:none}
  .legend{display:none}
  .attention{padding:10px 14px}
  .board{padding:12px 14px 16px}
  .drawer{--drawer-w:100vw}
  .att-title{display:none}
  .workers-grid{grid-template-columns:1fr}
}

/* ── Mobile phones (375-480px) ── */
@media (max-width: 480px) {
    body { overflow-x: hidden; }

    /* Nav — horizontal scroll */
    nav, .topbar, .nav-bar {
        padding: 0 0.75rem !important;
        height: auto !important;
        min-height: 52px !important;
        flex-wrap: nowrap !important;
    }
    nav .links, .topbar .links, .nav-links, .topbar-links {
        flex-wrap: nowrap !important;
        overflow-x: auto !important;
        -webkit-overflow-scrolling: touch;
        gap: 0.75rem !important;
        scrollbar-width: none;
    }
    nav .links::-webkit-scrollbar, .nav-links::-webkit-scrollbar { display: none; }
    nav .links a, .nav-links a { font-size: 0.8rem !important; padding: 0.45rem 0 !important; }
    nav .logo, .topbar .logo { font-size: 1.05rem !important; }

    /* Container padding */
    .container, [style*="padding: 2rem"], [style*="padding:2rem"] {
        padding: 1rem !important;
    }

    /* Tap targets */
    button, .btn, [class*="-btn"], [role="button"] {
        min-height: 44px;
    }

    /* Tables — horizontal scroll */
    table {
        display: block;
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
    }

    /* Cards / grids */
    [class*="-grid"], [class*="-board"] {
        grid-template-columns: 1fr !important;
    }

    /* Modals */
    [class*="-modal"], [class*="-overlay"] {
        width: 95vw !important;
        max-width: none !important;
    }

    /* Toast / notifications */
    [class*="toast"], [class*="notification"] {
        left: 1rem !important;
        right: 1rem !important;
        max-width: none !important;
    }

    /* Font sizing */
    h1 { font-size: 1.5rem !important; }
    h2 { font-size: 1.2rem !important; }
    .section-title, .page-title { font-size: 1.15rem !important; }
}
