<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent Inbox — devmclovin</title>
<style>
:root {
    --bg: #0d1117;
    --bg-card: #161b22;
    --bg-nav: #161b22;
    --border: #30363d;
    --text: #e6edf3;
    --text-muted: #8b949e;
    --accent: #7c3aed;
    --accent-hover: #8b5cf6;
    --accent-glow: rgba(124, 58, 237, 0.3);
    --green: #3fb950;
    --orange: #d2991d;
    --red: #f85149;
    --blue: #58a6ff;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    background: var(--bg); color: var(--text); line-height: 1.6; min-height: 100vh;
}
nav {
    background: var(--bg-nav); border-bottom: 1px solid var(--border);
    padding: 0 2rem; display: flex; align-items: center; justify-content: space-between;
    height: 60px; position: sticky; top: 0; z-index: 100; backdrop-filter: blur(10px);
}
nav .logo { font-size: 1.25rem; font-weight: 700; color: var(--text); text-decoration: none; }
nav .logo span { color: var(--accent); }
nav .links { display: flex; gap: 1.5rem; align-items: center; }
nav .links a { color: var(--text-muted); text-decoration: none; font-size: 0.9rem; }
nav .links a:hover, nav .links a.active { color: var(--text); }

.nav-dropdown{position:relative;display:flex;align-items:center}.nav-more-summary{color:var(--text-muted);font-size:.9rem;cursor:pointer;padding:.5rem 0;white-space:nowrap;list-style:none;user-select:none}.nav-more-summary::-webkit-details-marker{display:none}.nav-more-summary::after{content:" ▾";font-size:.7rem}.nav-more-summary:hover,.nav-more-summary.active{color:var(--text)}.nav-dropdown-menu{position:absolute;top:100%;right:0;background:var(--bg-card);border:1px solid var(--border);border-radius:10px;padding:.4rem 0;min-width:210px;z-index:150;box-shadow:0 8px 30px rgba(0,0,0,.4);display:flex;flex-direction:column}.nav-dropdown-menu a{padding:.5rem 1rem!important}.nav-dropdown-menu a:hover{background:rgba(124,58,237,.1)}.nav-menu-label{padding:.35rem 1rem .2rem;color:var(--text-muted);font-size:.65rem;text-transform:uppercase;letter-spacing:.08em;opacity:.75}.hermes-btn{background:var(--accent);color:#fff!important;padding:.4rem 1rem!important;border-radius:6px;font-weight:600}.hermes-btn:hover{background:var(--accent-hover)}

.container { max-width: 1100px; margin: 0 auto; padding: 0 1.5rem 3rem; }

.inbox-hero { padding: 2rem 0 1rem; }
.inbox-hero h1 { font-size: 1.75rem; font-weight: 700; }
.inbox-hero p { color: var(--text-muted); font-size: 0.95rem; margin-top: 0.25rem; }
.inbox-actions { display: flex; gap: 0.75rem; align-items: center; flex-wrap: wrap; margin-bottom: 1.25rem; }
.inbox-actions select { background: var(--bg-card); color: var(--text); border: 1px solid var(--border); border-radius: 6px; padding: 0.45rem 0.75rem; font-size: 0.85rem; font-family: inherit; }
.inbox-btn {
    display: inline-flex; align-items: center; gap: 0.35rem; padding: 0.45rem 0.9rem;
    border-radius: 6px; font-size: 0.85rem; font-weight: 500; cursor: pointer;
    border: 1px solid var(--border); background: var(--bg-card); color: var(--text);
    text-decoration: none; transition: all 0.15s; font-family: inherit; white-space: nowrap;
}
.inbox-btn:hover { border-color: var(--accent); background: #1c2333; }
.inbox-btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
.inbox-btn.primary:hover { background: var(--accent-hover); box-shadow: 0 0 20px var(--accent-glow); }
.inbox-btn.danger { color: var(--red); border-color: rgba(248,81,73,0.3); }
.inbox-btn.danger:hover { background: rgba(248,81,73,0.1); border-color: var(--red); }
.inbox-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
.inbox-table thead { position: sticky; top: 60px; z-index: 10; }
.inbox-table th {
    text-align: left; padding: 0.6rem 0.75rem; color: var(--text-muted);
    font-weight: 500; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.5px;
    background: var(--bg); border-bottom: 2px solid var(--border); white-space: nowrap;
}
.inbox-table td { padding: 0.6rem 0.75rem; border-bottom: 1px solid rgba(48,54,61,0.4); vertical-align: top; }
.inbox-table tr { cursor: pointer; transition: background 0.15s; }
.inbox-table tr:hover { background: rgba(124,58,237,0.04); }
.inbox-table tr.expanded { background: rgba(124,58,237,0.06); }
.inbox-col-summary { max-width: 300px; min-width: 150px; }
.inbox-col-summary strong { color: var(--text); }
.inbox-col-action { max-width: 250px; min-width: 120px; color: var(--text-muted); font-size: 0.82rem; word-break: break-word; }
.inbox-col-link { max-width: 200px; min-width: 80px; }
.inbox-col-link a { color: var(--accent-hover); text-decoration: none; font-size: 0.8rem; word-break: break-all; }
.inbox-col-link a:hover { text-decoration: underline; }
.inbox-col-status { width: 110px; }
.inbox-status { display: inline-block; padding: 0.15rem 0.55rem; border-radius: 10px; font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.3px; }
.inbox-status.new { background: rgba(88,166,255,0.15); color: var(--blue); }
.inbox-status.in_progress { background: rgba(210,153,29,0.15); color: var(--orange); }
.inbox-status.resolved { background: rgba(63,185,80,0.15); color: var(--green); }
.inbox-detail-row { display: none; }
.inbox-detail-row.show { display: table-row; }
.inbox-detail-row td { padding: 1rem 0.75rem 1.25rem; background: rgba(22,27,34,0.6); }
.inbox-detail { display: flex; flex-direction: column; gap: 0.6rem; }
.inbox-detail-meta { display: flex; gap: 1.5rem; flex-wrap: wrap; font-size: 0.78rem; color: var(--text-muted); }
.inbox-detail-actions { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 0.25rem; }
.inbox-form { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 1.25rem; margin-bottom: 1.25rem; display: none; }
.inbox-form.show { display: block; }
.inbox-form h3 { font-size: 1rem; margin-bottom: 0.75rem; color: var(--accent-hover); }
.inbox-form-row { margin-bottom: 0.75rem; }
.inbox-form-row label { display: block; font-size: 0.8rem; color: var(--text-muted); margin-bottom: 0.25rem; font-weight: 500; text-transform: uppercase; letter-spacing: 0.3px; }
.inbox-form-row input, .inbox-form-row textarea, .inbox-form-row select { width: 100%; background: var(--bg); color: var(--text); border: 1px solid var(--border); border-radius: 6px; padding: 0.5rem 0.75rem; font-size: 0.88rem; font-family: inherit; }
.inbox-form-row textarea { resize: vertical; min-height: 70px; }
.inbox-form-row input:focus, .inbox-form-row textarea:focus, .inbox-form-row select:focus { outline: none; border-color: var(--accent); }
.inbox-form-buttons { display: flex; gap: 0.5rem; margin-top: 0.5rem; }
.inbox-empty { text-align: center; color: var(--text-muted); padding: 3rem 1rem; font-size: 0.95rem; }
.inbox-loading { text-align: center; color: var(--text-muted); padding: 2rem; }
.inbox-error { background: rgba(248,81,73,0.1); border: 1px solid rgba(248,81,73,0.25); border-radius: 8px; padding: 0.75rem 1rem; color: var(--red); margin: 1rem 0; display: none; }
.inbox-error.show { display: block; }
.inbox-pagination { display: flex; gap: 0.5rem; align-items: center; justify-content: center; padding: 1rem 0; font-size: 0.85rem; color: var(--text-muted); }
.inbox-pagination span { color: var(--text); }
.inbox-toast { position: fixed; bottom: 1.5rem; right: 1.5rem; background: var(--green); color: #fff; padding: 0.6rem 1.2rem; border-radius: 8px; font-size: 0.88rem; font-weight: 500; opacity: 0; transform: translateY(10px); transition: all 0.3s; pointer-events: none; z-index: 200; }
.inbox-toast.show { opacity: 1; transform: translateY(0); }
.inbox-toast.error { background: var(--red); }
@media (max-width: 768px) {
  .inbox-col-action, .inbox-col-link { display: none; }
  .inbox-table { font-size: 0.82rem; }
  .inbox-hero h1 { font-size: 1.4rem; }
  .inbox-col-summary { max-width: 200px; }
  nav { padding: 0 1rem; }
}

/* ── Mobile phones (375-480px) ── */
@media (max-width: 480px) {
    body { overflow-x: hidden; }

    /* Nav — horizontal scroll */
    nav, .topbar, .nav-bar {
        padding: 0 0.75rem !important;
        height: auto !important;
        min-height: 52px !important;
        flex-wrap: nowrap !important;
    }
    nav .links, .topbar .links, .nav-links, .topbar-links {
        flex-wrap: nowrap !important;
        overflow-x: auto !important;
        -webkit-overflow-scrolling: touch;
        gap: 0.75rem !important;
        scrollbar-width: none;
    }
    nav .links::-webkit-scrollbar, .nav-links::-webkit-scrollbar { display: none; }
    nav .links a, .nav-links a { font-size: 0.8rem !important; padding: 0.45rem 0 !important; }
    nav .logo, .topbar .logo { font-size: 1.05rem !important; }

    /* Container padding */
    .container, [style*="padding: 2rem"], [style*="padding:2rem"] {
        padding: 1rem !important;
    }

    /* Tap targets */
    button, .btn, [class*="-btn"], [role="button"] {
        min-height: 44px;
    }

    /* Tables — horizontal scroll */
    table {
        display: block;
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
    }

    /* Cards / grids */
    [class*="-grid"], [class*="-board"] {
        grid-template-columns: 1fr !important;
    }

    /* Modals */
    [class*="-modal"], [class*="-overlay"] {
        width: 95vw !important;
        max-width: none !important;
    }

    /* Toast / notifications */
    [class*="toast"], [class*="notification"] {
        left: 1rem !important;
        right: 1rem !important;
        max-width: none !important;
    }

    /* Font sizing */
    h1 { font-size: 1.5rem !important; }
    h2 { font-size: 1.2rem !important; }
    .section-title, .page-title { font-size: 1.15rem !important; }
}

</style>
</head>
<body>
<nav>
  <a href="/" class="logo" aria-label="devmclovin home">dev<span>mclovin</span></a>
  <div class="links">
    <a href="/">Home</a>
    <a href="/briefings">Briefings</a>
    <a href="/projects">Projects</a>
    <a href="/hermes">Hermes</a>
    <details class="nav-dropdown"><summary class="nav-more-summary active">Tools</summary><div class="nav-dropdown-menu">
      <div class="nav-menu-label">Status & workflow</div>
      <a href="/status">Status</a>
      <a href="/notes">Notes</a>
      <a href="/inbox" class="active">Inbox</a>
      <a href="/runbooks">Runbooks</a>
    </div></details>
    <details class="nav-dropdown"><summary class="nav-more-summary">System</summary><div class="nav-dropdown-menu">
      <div class="nav-menu-label">Operations</div>
      <a href="/cron">Cron Jobs</a>
      <a href="/models">Models</a>
      <a href="/disk-cleanup">Disk</a>
      <a href="/tunnel">Tunnel</a>
      <a href="/logs">Logs</a>
    </div></details>
    <a href="https://ssh.devmclovin.com" class="hermes-btn">SSH</a>
  </div>
</nav>
<div class="container">
  <div class="inbox-hero">
    <h1>&#x1f4e5; Agent Inbox</h1>
    <p>Track tasks, notifications, and items that need agent attention.</p>
  </div>
  <div class="inbox-actions">
    <button class="inbox-btn primary" onclick="showAddForm()">&#x2795; Add Item</button>
    <select id="status-filter" onchange="changeFilter()">
      <option value="">All Statuses</option>
      <option value="new">New</option>
      <option value="in_progress">In Progress</option>
      <option value="resolved">Resolved</option>
    </select>
  </div>
  <div id="inbox-error" class="inbox-error"></div>
  <div id="inbox-form" class="inbox-form">
    <h3 id="form-title">Add Inbox Item</h3>
    <input type="hidden" id="item-id">
    <div class="inbox-form-row"><label>Summary</label><input id="item-summary" placeholder="Short description of the item" maxlength="500"></div>
    <div class="inbox-form-row"><label>Suggested Action</label><textarea id="item-action" placeholder="What should the agent do about this?" maxlength="1000"></textarea></div>
    <div class="inbox-form-row"><label>Link (optional)</label><input id="item-link" placeholder="https://…"></div>
    <div class="inbox-form-row"><label>Status</label><select id="item-status"><option value="new">New</option><option value="in_progress">In Progress</option><option value="resolved">Resolved</option></select></div>
    <div class="inbox-form-buttons">
      <button class="inbox-btn primary" id="form-submit" onclick="saveItem()">Create Item</button>
      <button class="inbox-btn" id="form-cancel" onclick="hideForm()">Cancel</button>
    </div>
  </div>
  <table class="inbox-table">
    <thead><tr><th class="inbox-col-summary">Summary</th><th class="inbox-col-status">Status</th><th class="inbox-col-action">Suggested Action</th><th class="inbox-col-link">Link</th><th style="width:40px"></th></tr></thead>
    <tbody id="inbox-tbody"></tbody>
  </table>
  <div id="inbox-pagination" class="inbox-pagination"></div>
  <div id="inbox-toast" class="inbox-toast"></div>
</div>

<script>
const API = 'http://127.0.0.1:8000';
const KEY = 'inbox-dev-key-change-me';

function api(path, opts) {
  opts = opts || {};
  var headers = opts.headers || {};
  headers['X-API-Key'] = KEY;
  if (opts.body && typeof opts.body === 'object') {
    headers['Content-Type'] = 'application/json';
    opts.body = JSON.stringify(opts.body);
  }
  return fetch(API + path, {headers: headers, method: opts.method || 'GET', body: opts.body})
    .then(function(r) {
      if (r.status === 204) return null;
      if (!r.ok) return r.json().then(function(e) { throw new Error(e.detail || 'HTTP ' + r.status); });
      return r.json();
    });
}

function toast(msg, isErr) {
  var el = document.getElementById('inbox-toast');
  el.textContent = msg;
  el.className = 'inbox-toast' + (isErr ? ' error' : '') + ' show';
  setTimeout(function() { el.classList.remove('show'); }, 2500);
}

var filterStatus = '';
var currentOffset = 0;
var currentLimit = 25;
var currentTotal = 0;

function loadItems() {
  var tableBody = document.getElementById('inbox-tbody');
  tableBody.innerHTML = '<tr><td colspan="5" class="inbox-loading">Loading\u2026</td></tr>';
  document.getElementById('inbox-error').classList.remove('show');
  var qs = '?offset=' + currentOffset + '&limit=' + currentLimit + '&sort_by=created_at&sort_order=desc';
  if (filterStatus) qs += '&status=' + encodeURIComponent(filterStatus);
  api('/api/v1/items' + qs).then(function(data) {
    currentTotal = data.total;
    renderTable(data.items);
    renderPagination();
  }).catch(function(e) {
    document.getElementById('inbox-error').textContent = 'Failed to load items: ' + e.message;
    document.getElementById('inbox-error').classList.add('show');
    tableBody.innerHTML = '';
  });
}

function statusBadge(s) {
  return '<span class="inbox-status ' + s + '">' + s.replace('_', ' ') + '</span>';
}

function formatTime(ts) {
  if (!ts) return '';
  return new Date(ts).toLocaleString();
}

function esc(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderTable(items) {
  var tbody = document.getElementById('inbox-tbody');
  if (!items || !items.length) {
    tbody.innerHTML = '<tr><td colspan="5" class="inbox-empty"><p>&#x1f4ed; No inbox items yet.</p><p style="font-size:0.8rem;margin-top:0.5rem">Click \u201cAdd Item\u201d to create one.</p></td></tr>';
    document.getElementById('inbox-pagination').innerHTML = '';
    return;
  }
  var html = '';
  items.forEach(function(item) {
    var linkCell = item.link
      ? '<a href="' + esc(item.link) + '" target="_blank" rel="noopener" onclick="event.stopPropagation()">\u2197 ' + esc(item.link.substring(0,40)) + (item.link.length > 40 ? '\u2026' : '') + '</a>'
      : '\u2014';
    html += '<tr onclick="toggleDetail(\'' + item.id + '\')" id="row-' + item.id + '">';
    html += '<td class="inbox-col-summary"><strong>' + esc(item.summary) + '</strong></td>';
    html += '<td class="inbox-col-status">' + statusBadge(item.status) + '</td>';
    html += '<td class="inbox-col-action">' + esc(item.suggested_action) + '</td>';
    html += '<td class="inbox-col-link">' + linkCell + '</td>';
    html += '<td style="width:40px;text-align:right;color:var(--text-muted)">\u25b6</td>';
    html += '</tr>';
    html += '<tr class="inbox-detail-row" id="detail-' + item.id + '"><td colspan="5">';
    html += '<div class="inbox-detail">';
    html += '<div class="inbox-detail-meta">';
    html += '<span>&#x1f194; <code style="font-size:0.75rem;color:var(--accent-hover)">' + item.id + '</code></span>';
    html += '<span>&#x1f4c5; Created: ' + formatTime(item.created_at) + '</span>';
    html += '<span>&#x1f504; Updated: ' + formatTime(item.updated_at) + '</span>';
    html += '</div>';
    html += '<div><strong style="font-size:0.8rem;color:var(--text-muted)">Suggested Action:</strong><br><span style="font-size:0.88rem">' + esc(item.suggested_action) + '</span></div>';
    if (item.link) {
      html += '<div><strong style="font-size:0.8rem;color:var(--text-muted)">Link:</strong><br><a href="' + esc(item.link) + '" target="_blank" rel="noopener" style="color:var(--accent-hover);font-size:0.85rem">' + esc(item.link) + '</a></div>';
    }
    html += '<div class="inbox-detail-actions">';
    html += '<button class="inbox-btn" onclick="event.stopPropagation();editItem(\'' + item.id + '\')">\u270f\ufe0f Edit</button>';
    if (item.status === 'new') {
      html += '<button class="inbox-btn" onclick="event.stopPropagation();updateStatus(\'' + item.id + '\',\'in_progress\')">\u25b6 Start</button>';
    } else if (item.status === 'in_progress') {
      html += '<button class="inbox-btn" onclick="event.stopPropagation();updateStatus(\'' + item.id + '\',\'resolved\')">\u2705 Resolve</button>';
      html += '<button class="inbox-btn" onclick="event.stopPropagation();updateStatus(\'' + item.id + '\',\'new\')">\u21a9 Back to New</button>';
    } else if (item.status === 'resolved') {
      html += '<button class="inbox-btn" onclick="event.stopPropagation();updateStatus(\'' + item.id + '\',\'new\')">\u{1f504} Reopen</button>';
    }
    html += '<button class="inbox-btn danger" onclick="event.stopPropagation();deleteItem(\'' + item.id + '\')">\u{1f5d1} Delete</button>';
    html += '</div></div></td></tr>';
  });
  tbody.innerHTML = html;
}

function toggleDetail(id) {
  var detailRow = document.getElementById('detail-' + id);
  var row = document.getElementById('row-' + id);
  var arrow = row.querySelector('td:last-child');
  if (detailRow.classList.contains('show')) {
    detailRow.classList.remove('show');
    row.classList.remove('expanded');
    arrow.textContent = '\u25b6';
  } else {
    document.querySelectorAll('.inbox-detail-row.show').forEach(function(r) { r.classList.remove('show'); });
    document.querySelectorAll('.inbox-table tr.expanded').forEach(function(r) { r.classList.remove('expanded'); });
    document.querySelectorAll('.inbox-table tr td:last-child').forEach(function(t) { if (t.textContent === '\u25bc') t.textContent = '\u25b6'; });
    detailRow.classList.add('show');
    row.classList.add('expanded');
    arrow.textContent = '\u25bc';
  }
}

function renderPagination() {
  var el = document.getElementById('inbox-pagination');
  var totalPages = Math.ceil(currentTotal / currentLimit);
  var currentPage = Math.floor(currentOffset / currentLimit) + 1;
  if (totalPages <= 1) { el.innerHTML = ''; return; }
  var html = '';
  html += '<button class="inbox-btn" onclick="goPage(0)"' + (currentOffset === 0 ? ' disabled style="opacity:0.4"' : '') + '>\u23ee</button>';
  html += '<button class="inbox-btn" onclick="goPage(' + (currentOffset - currentLimit) + ')"' + (currentOffset === 0 ? ' disabled style="opacity:0.4"' : '') + '>\u25c0</button>';
  html += '<span>Page ' + currentPage + ' of ' + totalPages + ' (' + currentTotal + ' items)</span>';
  html += '<button class="inbox-btn" onclick="goPage(' + (currentOffset + currentLimit) + ')"' + (currentOffset + currentLimit >= currentTotal ? ' disabled style="opacity:0.4"' : '') + '>\u25b6</button>';
  html += '<button class="inbox-btn" onclick="goPage(' + (Math.max(0, (totalPages - 1) * currentLimit)) + ')"' + (currentOffset + currentLimit >= currentTotal ? ' disabled style="opacity:0.4"' : '') + '>\u23ed</button>';
  el.innerHTML = html;
}

function goPage(offset) { currentOffset = Math.max(0, offset); loadItems(); }
function changeFilter() { filterStatus = document.getElementById('status-filter').value; currentOffset = 0; loadItems(); }

function showAddForm() {
  var form = document.getElementById('inbox-form');
  form.classList.add('show');
  document.getElementById('form-title').textContent = 'Add Inbox Item';
  document.getElementById('item-id').value = '';
  document.getElementById('item-summary').value = '';
  document.getElementById('item-action').value = '';
  document.getElementById('item-link').value = '';
  document.getElementById('item-status').value = 'new';
  document.getElementById('form-submit').textContent = 'Create Item';
}

function hideForm() { document.getElementById('inbox-form').classList.remove('show'); }

function saveItem() {
  var id = document.getElementById('item-id').value;
  var data = {
    summary: document.getElementById('item-summary').value.trim(),
    suggested_action: document.getElementById('item-action').value.trim(),
    link: document.getElementById('item-link').value.trim() || null,
    status: document.getElementById('item-status').value
  };
  if (!data.summary) { toast('Summary is required.', true); return; }
  if (!data.suggested_action) { toast('Suggested action is required.', true); return; }
  var promise = id
    ? api('/api/v1/items/' + id, {method: 'PUT', body: data})
    : api('/api/v1/items', {method: 'POST', body: data});
  promise.then(function() {
    hideForm();
    loadItems();
    toast(id ? 'Item updated!' : 'Item created!');
  }).catch(function(e) { toast('Failed to save: ' + e.message, true); });
}

function editItem(id) {
  api('/api/v1/items/' + id).then(function(item) {
    var form = document.getElementById('inbox-form');
    form.classList.add('show');
    document.getElementById('form-title').textContent = 'Edit Inbox Item';
    document.getElementById('item-id').value = item.id;
    document.getElementById('item-summary').value = item.summary;
    document.getElementById('item-action').value = item.suggested_action;
    document.getElementById('item-link').value = item.link || '';
    document.getElementById('item-status').value = item.status;
    document.getElementById('form-submit').textContent = 'Update Item';
  }).catch(function(e) { toast('Failed to load item: ' + e.message, true); });
}

function updateStatus(id, newStatus) {
  api('/api/v1/items/' + id, {method: 'PUT', body: {status: newStatus}})
    .then(function() { loadItems(); toast('Status updated to ' + newStatus.replace('_', ' ') + '!'); })
    .catch(function(e) { toast('Failed to update status: ' + e.message, true); });
}

function deleteItem(id) {
  if (!confirm('Delete this inbox item? This cannot be undone.')) return;
  api('/api/v1/items/' + id, {method: 'DELETE'})
    .then(function() { loadItems(); toast('Item deleted.'); })
    .catch(function(e) { toast('Failed to delete: ' + e.message, true); });
}

document.addEventListener('DOMContentLoaded', loadItems);
</script>
<script>
(function() {
  function setupNavDropdowns() {
    var dropdowns = Array.prototype.slice.call(document.querySelectorAll('details.nav-dropdown'));
    dropdowns.forEach(function(dropdown) {
      dropdown.addEventListener('toggle', function() {
        if (dropdown.open) {
          dropdowns.forEach(function(other) { if (other !== dropdown) other.open = false; });
        }
      });
    });
    document.addEventListener('click', function(e) {
      if (!e.target.closest('details.nav-dropdown')) {
        dropdowns.forEach(function(dropdown) { dropdown.open = false; });
      }
    });
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') {
        dropdowns.forEach(function(dropdown) { dropdown.open = false; });
      }
    });
  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', setupNavDropdowns);
  } else {
    setupNavDropdowns();
  }
})();
</script>

</body>
</html>
