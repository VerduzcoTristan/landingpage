<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notes — devmclovin</title>
<style>
:root {
    --bg: #0d1117;
    --bg-card: #161b22;
    --bg-nav: #161b22;
    --border: #30363d;
    --text: #e6edf3;
    --text-muted: #8b949e;
    --accent: #7c3aed;
    --accent-hover: #8b5cf6;
    --accent-glow: rgba(124, 58, 237, 0.3);
    --green: #3fb950;
    --orange: #d2991d;
    --red: #f85149;
    --blue: #58a6ff;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    background: var(--bg); color: var(--text); line-height: 1.6; min-height: 100vh;
}
__SITE_NAV_CSS__

.container { max-width: 1100px; margin: 0 auto; padding: 0 1.5rem 3rem; }

/* ── Hero ── */
.notes-hero { padding: 2rem 0 1rem; }
.notes-hero h1 { font-size: 1.75rem; font-weight: 700; }
.notes-hero p { color: var(--text-muted); font-size: 0.95rem; margin-top: 0.25rem; }

/* ── Actions bar ── */
.notes-actions { display: flex; gap: 0.75rem; align-items: center; flex-wrap: wrap; margin-bottom: 1.25rem; }

/* ── Buttons ── */
.notes-btn {
    display: inline-flex; align-items: center; gap: 0.35rem; padding: 0.45rem 0.9rem;
    border-radius: 6px; font-size: 0.85rem; font-weight: 500; cursor: pointer;
    border: 1px solid var(--border); background: var(--bg-card); color: var(--text);
    text-decoration: none; transition: all 0.15s; font-family: inherit; white-space: nowrap;
}
.notes-btn:hover { border-color: var(--accent); background: #1c2333; }
.notes-btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
.notes-btn.primary:hover { background: var(--accent-hover); box-shadow: 0 0 20px var(--accent-glow); }
.notes-btn.danger { color: var(--red); border-color: rgba(248,81,73,0.3); }
.notes-btn.danger:hover { background: rgba(248,81,73,0.1); border-color: var(--red); }
.notes-btn.small { padding: 0.25rem 0.55rem; font-size: 0.78rem; }

/* ── Card grid ── */
.notes-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 1rem;
}
.note-card {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 10px; padding: 1.15rem;
    transition: border-color 0.15s, box-shadow 0.15s;
    display: flex; flex-direction: column;
}
.note-card:hover { border-color: var(--accent); box-shadow: 0 0 15px rgba(124,58,237,0.08); }
.note-card-title {
    font-size: 1rem; font-weight: 600; color: var(--text);
    margin-bottom: 0.4rem; word-break: break-word;
}
.note-card-content {
    font-size: 0.85rem; color: var(--text-muted); flex: 1;
    overflow: hidden; display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical;
    margin-bottom: 0.75rem; line-height: 1.5;
}
.note-card-meta {
    font-size: 0.72rem; color: var(--text-muted);
    display: flex; justify-content: space-between; align-items: center;
    border-top: 1px solid var(--border); padding-top: 0.65rem; margin-top: 0.25rem;
}
.note-card-actions { display: flex; gap: 0.35rem; }

/* ── Modal overlay ── */
.modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 150;
    display: flex; align-items: center; justify-content: center;
    animation: fadeIn 0.2s;
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.modal-box {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 12px; padding: 1.5rem; max-width: 560px; width: 90%;
    max-height: 85vh; overflow-y: auto; animation: slideUp 0.25s;
}
@keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
.modal-box h3 { font-size: 1.1rem; margin-bottom: 1rem; color: var(--accent-hover); }
.modal-row { margin-bottom: 0.85rem; }
.modal-row label {
    display: block; font-size: 0.8rem; color: var(--text-muted);
    margin-bottom: 0.3rem; font-weight: 500; text-transform: uppercase; letter-spacing: 0.3px;
}
.modal-row input, .modal-row textarea {
    width: 100%; background: var(--bg); color: var(--text);
    border: 1px solid var(--border); border-radius: 6px;
    padding: 0.55rem 0.75rem; font-size: 0.9rem; font-family: inherit;
}
.modal-row textarea { resize: vertical; min-height: 120px; }
.modal-row input:focus, .modal-row textarea:focus { outline: none; border-color: var(--accent); }
.modal-buttons { display: flex; gap: 0.5rem; margin-top: 0.75rem; }

/* ── Confirm dialog (custom) ── */
.confirm-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 200;
    display: flex; align-items: center; justify-content: center;
    animation: fadeIn 0.15s;
}
.confirm-modal {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 12px; padding: 1.5rem; max-width: 420px; width: 90%;
    text-align: center; animation: slideUp 0.2s;
}
.confirm-icon { font-size: 2rem; margin-bottom: 0.5rem; }
.confirm-title { font-size: 1.05rem; font-weight: 600; margin-bottom: 0.4rem; }
.confirm-desc { color: var(--text-muted); font-size: 0.88rem; margin-bottom: 1rem; }
.confirm-input-row { margin-bottom: 0.75rem; }
.confirm-input-row input {
    width: 100%; background: var(--bg); color: var(--text);
    border: 1px solid var(--border); border-radius: 6px;
    padding: 0.5rem 0.75rem; font-size: 0.85rem; font-family: inherit; text-align: center;
}
.confirm-input-row input:focus { outline: none; border-color: var(--accent); }
.confirm-buttons { display: flex; gap: 0.5rem; justify-content: center; }
.confirm-btn {
    padding: 0.45rem 1rem; border-radius: 6px; font-size: 0.85rem;
    font-weight: 500; cursor: pointer; border: 1px solid var(--border);
    background: var(--bg-card); color: var(--text); font-family: inherit; transition: all 0.15s;
}
.confirm-btn:hover { border-color: var(--accent); }
.confirm-btn.danger { color: var(--red); border-color: rgba(248,81,73,0.3); }
.confirm-btn.danger:hover { background: rgba(248,81,73,0.1); border-color: var(--red); }
.confirm-btn.danger:disabled { opacity: 0.4; cursor: not-allowed; border-color: var(--border); background: var(--bg-card); }

/* ── Empty state ── */
.notes-empty { text-align: center; color: var(--text-muted); padding: 3rem 1rem; }
.notes-empty p { font-size: 0.95rem; }
.notes-empty p.sub { font-size: 0.8rem; margin-top: 0.5rem; }

/* ── Loading ── */
.notes-loading { text-align: center; color: var(--text-muted); padding: 2rem; font-size: 0.9rem; }

/* ── Toast ── */
.notes-toast {
    position: fixed; bottom: 1.5rem; right: 1.5rem;
    background: var(--green); color: #fff; padding: 0.6rem 1.2rem;
    border-radius: 8px; font-size: 0.88rem; font-weight: 500;
    opacity: 0; transform: translateY(10px); transition: all 0.3s;
    pointer-events: none; z-index: 300;
}
.notes-toast.show { opacity: 1; transform: translateY(0); }
.notes-toast.error { background: var(--red); }

/* ── Responsive ── */
@media (max-width: 768px) {
    .notes-grid { grid-template-columns: 1fr; }
    .notes-hero h1 { font-size: 1.4rem; }
    nav { padding: 0 1rem; }
    .modal-box { width: 95%; padding: 1rem; }
}

/* ── Mobile phones (375-480px) ── */
@media (max-width: 480px) {
    body { overflow-x: hidden; }

    /* Nav — horizontal scroll */
    nav, .topbar, .nav-bar {
        padding: 0 0.75rem !important;
        height: auto !important;
        min-height: 52px !important;
        flex-wrap: nowrap !important;
    }
    nav .links, .topbar .links, .nav-links, .topbar-links {
        flex-wrap: nowrap !important;
        overflow-x: auto !important;
        -webkit-overflow-scrolling: touch;
        gap: 0.75rem !important;
        scrollbar-width: none;
    }
    nav .links::-webkit-scrollbar, .nav-links::-webkit-scrollbar { display: none; }
    nav .links a, .nav-links a { font-size: 0.8rem !important; padding: 0.45rem 0 !important; }
    nav .logo, .topbar .logo { font-size: 1.05rem !important; }

    /* Container padding */
    .container, [style*="padding: 2rem"], [style*="padding:2rem"] {
        padding: 1rem !important;
    }

    /* Tap targets */
    button, .btn, [class*="-btn"], [role="button"] {
        min-height: 44px;
    }

    /* Tables — horizontal scroll */
    table {
        display: block;
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
    }

    /* Cards / grids */
    [class*="-grid"], [class*="-board"] {
        grid-template-columns: 1fr !important;
    }

    /* Modals */
    [class*="-modal"], [class*="-overlay"] {
        width: 95vw !important;
        max-width: none !important;
    }

    /* Toast / notifications */
    [class*="toast"], [class*="notification"] {
        left: 1rem !important;
        right: 1rem !important;
        max-width: none !important;
    }

    /* Font sizing */
    h1 { font-size: 1.5rem !important; }
    h2 { font-size: 1.2rem !important; }
    .section-title, .page-title { font-size: 1.15rem !important; }
}

</style>
</head>
<body>

__SITE_NAV__

<div class="container">
  <div class="notes-hero">
    <h1>&#x1f4dd; Personal Notes</h1>
    <p>Quick notes, ideas, and todos. Stored locally on your server.</p>
  </div>

  <div class="notes-actions">
    <button class="notes-btn primary" onclick="openModal()">&#x2795; New Note</button>
  </div>

  <div id="notes-grid" class="notes-grid"></div>
  <div id="notes-toast" class="notes-toast"></div>
</div>

<script>
// ── API client ──
var API_BASE = '/api/notes';

function api(path, opts) {
    opts = opts || {};
    var headers = opts.headers || {};
    if (opts.body && typeof opts.body === 'object') {
        headers['Content-Type'] = 'application/json';
        opts.body = JSON.stringify(opts.body);
    }
    return fetch(API_BASE + path, {headers: headers, method: opts.method || 'GET', body: opts.body})
        .then(function(r) {
            if (r.status === 204) return null;
            if (!r.ok) return r.json().then(function(e) { throw new Error(e.detail || 'HTTP ' + r.status); });
            return r.json();
        });
}

// ── Toast ──
function toast(msg, isErr) {
    var el = document.getElementById('notes-toast');
    el.textContent = msg;
    el.className = 'notes-toast' + (isErr ? ' error' : '') + ' show';
    setTimeout(function() { el.classList.remove('show'); }, 2800);
}

// ── Helpers ──
function esc(s) {
    if (!s) return '';
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function fmtTime(ts) {
    if (!ts) return '';
    return new Date(ts).toLocaleString();
}

// ── Load notes ──
function loadNotes() {
    var grid = document.getElementById('notes-grid');
    grid.innerHTML = '<div class="notes-loading">Loading&#x2026;</div>';
    api('').then(function(notes) {
        if (!notes || notes.length === 0) {
            grid.innerHTML = '<div class="notes-empty"><p>&#x1f4ed; No notes yet.</p><p class="sub">Click &#x201c;New Note&#x201d; to create your first note.</p></div>';
            return;
        }
        var html = '';
        notes.forEach(function(n) {
            var contentPreview = esc(n.content || '');
            if (contentPreview.length > 200) contentPreview = contentPreview.substring(0, 200) + '&#x2026;';
            html += '<div class="note-card">';
            html += '<div class="note-card-title">' + esc(n.title) + '</div>';
            html += '<div class="note-card-content">' + (contentPreview || '<em style="color:var(--text-muted)">No content</em>') + '</div>';
            html += '<div class="note-card-meta">';
            html += '<span>' + fmtTime(n.updated_at) + '</span>';
            html += '<div class="note-card-actions">';
            html += '<button class="notes-btn small" onclick="editNote(\'' + n.id + '\')" title="Edit">&#x270f;&#xfe0f;</button>';
            html += '<button class="notes-btn small danger" onclick="confirmDelete(\'' + n.id + '\', \'' + esc(n.title).replace(/'/g, "\\'") + '\')" title="Delete">&#x1f5d1;</button>';
            html += '</div></div></div>';
        });
        grid.innerHTML = html;
    }).catch(function(e) {
        grid.innerHTML = '<div class="notes-empty"><p style="color:var(--red)">Failed to load notes.</p><p class="sub">' + esc(e.message) + '</p></div>';
        toast('Failed to load notes: ' + e.message, true);
    });
}

// ── Modal ──
var editingId = null;

function openModal(id) {
    editingId = id || null;
    var overlay = document.getElementById('modal-overlay');
    if (overlay) overlay.remove();

    overlay = document.createElement('div');
    overlay.id = 'modal-overlay';
    overlay.className = 'modal-overlay';
    overlay.onclick = function(e) { if (e.target === overlay) closeModal(); };

    var title = id ? 'Edit Note' : 'New Note';
    var saveLabel = id ? 'Update' : 'Create';
    var titleVal = '';
    var contentVal = '';

    if (id) {
        // Fetch current values
        api('/' + id).then(function(note) {
            document.getElementById('modal-title-input').value = note.title || '';
            document.getElementById('modal-content-input').value = note.content || '';
        }).catch(function(e) {
            toast('Failed to load note: ' + e.message, true);
        });
    }

    overlay.innerHTML =
        '<div class="modal-box">' +
        '<h3>' + title + '</h3>' +
        '<div class="modal-row"><label>Title</label><input id="modal-title-input" placeholder="Note title" maxlength="500" value="' + esc(titleVal) + '"></div>' +
        '<div class="modal-row"><label>Content</label><textarea id="modal-content-input" placeholder="Write your note here&#x2026;" maxlength="50000">' + esc(contentVal) + '</textarea></div>' +
        '<div class="modal-buttons">' +
        '<button class="notes-btn primary" id="modal-save-btn" onclick="saveNote()">' + saveLabel + '</button>' +
        '<button class="notes-btn" onclick="closeModal()">Cancel</button>' +
        '</div>' +
        '</div>';

    document.body.appendChild(overlay);
    setTimeout(function() {
        var t = document.getElementById('modal-title-input');
        if (t) t.focus();
    }, 100);

    // If editing, fetch and populate
    if (id) {
        api('/' + id).then(function(note) {
            document.getElementById('modal-title-input').value = note.title || '';
            document.getElementById('modal-content-input').value = note.content || '';
        }).catch(function(e) {
            toast('Failed to load note: ' + e.message, true);
        });
    }
}

function closeModal() {
    var overlay = document.getElementById('modal-overlay');
    if (overlay) overlay.remove();
    editingId = null;
}

function saveNote() {
    var titleEl = document.getElementById('modal-title-input');
    var contentEl = document.getElementById('modal-content-input');
    if (!titleEl || !contentEl) return;

    var title = titleEl.value.trim();
    var content = contentEl.value.trim();

    if (!title) { toast('Title is required.', true); return; }

    var body = {title: title, content: content};
    var method, path;

    if (editingId) {
        method = 'PATCH';
        path = '/' + editingId;
    } else {
        method = 'POST';
        path = '';
    }

    api(path, {method: method, body: body}).then(function() {
        closeModal();
        loadNotes();
        toast(editingId ? 'Note updated!' : 'Note created!');
    }).catch(function(e) {
        toast('Failed to save: ' + e.message, true);
    });
}

function editNote(id) {
    openModal(id);
}

// ── Delete confirmation ──
function confirmDelete(id, title) {
    var overlay = document.createElement('div');
    overlay.className = 'confirm-overlay';
    overlay.id = '__confirm_dlg';
    overlay.onclick = function(e) { if (e.target === overlay) closeConfirm(); };

    overlay.innerHTML =
        '<div class="confirm-modal">' +
        '<div class="confirm-icon">&#x1f5d1;&#xfe0f;</div>' +
        '<div class="confirm-title">Delete Note</div>' +
        '<div class="confirm-desc">Are you sure you want to delete <strong>"' + esc(title) + '"</strong>?<br>This cannot be undone.</div>' +
        '<div class="confirm-input-row"><input type="text" id="__confirm_input" placeholder="Type DELETE to confirm" autocomplete="off"></div>' +
        '<div class="confirm-buttons">' +
        '<button class="confirm-btn" id="__confirm_cancel">Cancel</button>' +
        '<button class="confirm-btn danger" id="__confirm_ok" disabled>Delete</button>' +
        '</div>' +
        '</div>';

    document.body.appendChild(overlay);

    var input = document.getElementById('__confirm_input');
    var okBtn = document.getElementById('__confirm_ok');
    var cancelBtn = document.getElementById('__confirm_cancel');

    input.focus();
    input.oninput = function() {
        okBtn.disabled = input.value.trim() !== 'DELETE';
    };
    input.onkeydown = function(e) {
        if (e.key === 'Enter' && input.value.trim() === 'DELETE') {
            closeConfirm();
            doDelete(id);
        } else if (e.key === 'Escape') {
            closeConfirm();
        }
    };
    cancelBtn.onclick = closeConfirm;
    okBtn.onclick = function() {
        if (input.value.trim() === 'DELETE') {
            closeConfirm();
            doDelete(id);
        }
    };
}

function closeConfirm() {
    var overlay = document.getElementById('__confirm_dlg');
    if (overlay) overlay.remove();
}

function doDelete(id) {
    api('/' + id, {method: 'DELETE'}).then(function() {
        loadNotes();
        toast('Note deleted.');
    }).catch(function(e) {
        toast('Failed to delete: ' + e.message, true);
    });
}

// ── Keyboard shortcuts ──
document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') {
        closeModal();
        closeConfirm();
    }
    if ((e.ctrlKey || e.metaKey) && e.key === 'n') {
        e.preventDefault();
        openModal();
    }
});

// ── Init ──
document.addEventListener('DOMContentLoaded', loadNotes);
</script>
<script>
(function() {
  function setupNavDropdowns() {
    var dropdowns = Array.prototype.slice.call(document.querySelectorAll('details.nav-dropdown'));
    dropdowns.forEach(function(dropdown) {
      dropdown.addEventListener('toggle', function() {
        if (dropdown.open) {
          dropdowns.forEach(function(other) { if (other !== dropdown) other.open = false; });
        }
      });
    });
    document.addEventListener('click', function(e) {
      if (!e.target.closest('details.nav-dropdown')) {
        dropdowns.forEach(function(dropdown) { dropdown.open = false; });
      }
    });
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') {
        dropdowns.forEach(function(dropdown) { dropdown.open = false; });
      }
    });
  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', setupNavDropdowns);
  } else {
    setupNavDropdowns();
  }
})();
</script>

</body>
</html>
