name: landing-page

services:
  landing-page:
    build:
      context: .
    container_name: landing-page
    restart: unless-stopped
    environment:
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1}
      BIND_HOST: 0.0.0.0
      DATA_DIR: /app/data
      HOME: /home/landing
      BRIEFING_DB_READ_ONLY: "true"
    networks:
      - app_net
      - proxy_net
    expose:
      - "3002"
    healthcheck:
      test:
        - CMD
        - python3
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:3002/', timeout=5)"
      interval: 30s
      timeout: 8s
      retries: 3
      start_period: 15s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=16m
    volumes:
      - ../data:/app/data
      - /home/hermes/.hermes/data/briefings.db:/home/landing/.hermes/data/briefings.db:ro
      - /home/hermes/.hermes/cron/output/7dc1d641173d:/home/landing/.hermes/cron/output/7dc1d641173d:ro

networks:
  app_net:
    internal: true
  proxy_net:
    external: true
