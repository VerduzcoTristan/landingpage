services:
  landing-page:
    build:
      context: .
    container_name: landing-page
    restart: unless-stopped
    environment:
      BIND_HOST: 0.0.0.0
      HOME: /home/landing
    networks:
      - proxy_net
    expose:
      - "3002"
    healthcheck:
      test:
        - CMD
        - python3
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:3002/', timeout=5)"
      interval: 30s
      timeout: 8s
      retries: 3
      start_period: 15s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

networks:
  proxy_net:
    external: true
