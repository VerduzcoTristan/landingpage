<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Service Status Board — devmclovin</title>
<style>
/* ── CSS Variables (matching devmclovin.com server.py) ── */
:root {
    --bg: #0d1117;
    --bg-card: #161b22;
    --bg-nav: #161b22;
    --border: #30363d;
    --text: #e6edf3;
    --text-muted: #8b949e;
    --accent: #7c3aed;
    --accent-hover: #8b5cf6;
    --accent-glow: rgba(124, 58, 237, 0.3);
    --green: #3fb950;
    --green-dim: rgba(63, 185, 80, 0.15);
    --orange: #d2991d;
    --orange-dim: rgba(210, 153, 29, 0.15);
    --red: #f85149;
    --red-dim: rgba(248, 81, 73, 0.15);
    --blue: #58a6ff;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    min-height: 100vh;
}

/* ── Navigation ── */
nav {
    background: var(--bg-nav);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 60px;
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(10px);
}
nav .logo { font-size: 1.25rem; font-weight: 700; color: var(--text); text-decoration: none; display: flex; align-items: center; gap: 0.5rem; }
nav .logo span { color: var(--accent); }
nav .links { display: flex; gap: 1.5rem; align-items: center; }
nav .links a { color: var(--text-muted); text-decoration: none; font-size: 0.9rem; transition: color 0.2s; padding: 0.5rem 0; }
nav .links a:hover, nav .links a.active { color: var(--text); }

.nav-dropdown{position:relative;display:flex;align-items:center}.nav-more-summary{color:var(--text-muted);font-size:.9rem;cursor:pointer;padding:.5rem 0;white-space:nowrap;list-style:none;user-select:none}.nav-more-summary::-webkit-details-marker{display:none}.nav-more-summary::after{content:" ▾";font-size:.7rem}.nav-more-summary:hover,.nav-more-summary.active{color:var(--text)}.nav-dropdown-menu{position:absolute;top:100%;right:0;background:var(--bg-card);border:1px solid var(--border);border-radius:10px;padding:.4rem 0;min-width:210px;z-index:150;box-shadow:0 8px 30px rgba(0,0,0,.4);display:flex;flex-direction:column}.nav-dropdown-menu a{padding:.5rem 1rem!important}.nav-dropdown-menu a:hover{background:rgba(124,58,237,.1)}.nav-menu-label{padding:.35rem 1rem .2rem;color:var(--text-muted);font-size:.65rem;text-transform:uppercase;letter-spacing:.08em;opacity:.75}.hermes-btn{background:var(--accent);color:#fff!important;padding:.4rem 1rem!important;border-radius:6px;font-weight:600}.hermes-btn:hover{background:var(--accent-hover)}


/* ── SSH button ── */
nav .links a.hermes-btn {
    background: var(--accent);
    color: #fff;
    padding: 0.4rem 1rem;
    border-radius: 6px;
    font-weight: 600;
    text-decoration: none;
}
nav .links a.hermes-btn:hover {
    background: var(--accent-hover);
    box-shadow: 0 0 20px var(--accent-glow);
}

/* ── Nav separator ── */
.nav-sep {
    display: inline-block;
    width: 1px;
    height: 20px;
    background: var(--border);
    margin: 0 0.25rem;
    vertical-align: middle;
}

/* ── Nav dropdown (More menu) ── */
.nav-dropdown {
    position: relative;
    display: flex;
    align-items: center;
}
.nav-more-summary {
    color: var(--text-muted);
    font-size: 0.9rem;
    cursor: pointer;
    padding: 0.5rem 0;
    white-space: nowrap;
    list-style: none;
    user-select: none;
    transition: color 0.2s;
}
.nav-more-summary::-webkit-details-marker { display: none; }
.nav-more-summary::after {
    content: " ▾";
    font-size: 0.7rem;
}
.nav-more-summary:hover { color: var(--text); }
.nav-dropdown-menu {
    position: absolute;
    top: 100%;
    right: 0;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0.4rem 0;
    min-width: 160px;
    z-index: 150;
    box-shadow: 0 8px 30px rgba(0,0,0,0.4);
    display: flex;
    flex-direction: column;
}
.nav-dropdown-menu a {
    color: var(--text-muted);
    text-decoration: none;
    font-size: 0.85rem;
    padding: 0.5rem 1rem;
    transition: background 0.15s, color 0.15s;
    white-space: nowrap;
}
.nav-dropdown-menu a:hover {
    background: rgba(124,58,237,0.1);
    color: var(--text);
}
.nav-dropdown-menu a.active { color: var(--accent-hover); }

/* ── Accessibility ── */
a:focus-visible,
button:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
    border-radius: 4px;
}

.page-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
    gap: 1rem;
}
.page-header h1 {
    font-size: 1.5rem;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 0.5rem;
}
.header-right {
    display: flex;
    align-items: center;
    gap: 1rem;
    font-size: 0.8rem;
    color: var(--text-muted);
}
#refresh-btn {
    padding: 0.4rem 1rem;
    border: 1px solid var(--border);
    background: var(--bg-card);
    color: var(--text-muted);
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.8rem;
    transition: all 0.2s;
}
#refresh-btn:hover { border-color: var(--accent); color: var(--text); }
#auto-refresh-toggle {
    padding: 0.4rem 0.75rem;
    border: 1px solid var(--border);
    background: var(--bg-card);
    color: var(--text-muted);
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.8rem;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 0.35rem;
}
#auto-refresh-toggle:hover { border-color: var(--accent); }
#auto-refresh-toggle.on { border-color: var(--green); color: var(--green); }
#auto-refresh-toggle .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text-muted); }
#auto-refresh-toggle.on .dot { background: var(--green); animation: pulse-dot 2s infinite; }
@keyframes pulse-dot { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

/* ── Summary row ── */
.status-summary {
    display: flex;
    gap: 1rem;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
}
.status-summary .stat-pill {
    padding: 0.35rem 0.9rem;
    border-radius: 20px;
    font-size: 0.8rem;
    font-weight: 600;
    border: 1px solid var(--border);
    background: var(--bg-card);
    display: flex;
    align-items: center;
    gap: 0.4rem;
}
.stat-pill.ok { border-color: var(--green); color: var(--green); }
.stat-pill.warn { border-color: var(--orange); color: var(--orange); }
.stat-pill.err { border-color: var(--red); color: var(--red); }

/* ── Service Table ── */
.service-table {
    width: 100%;
    border-collapse: separate;
    border-spacing: 0;
}
.service-table thead th {
    text-align: left;
    padding: 0.6rem 1rem;
    font-size: 0.75rem;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    border-bottom: 1px solid var(--border);
    font-weight: 600;
}
.service-row {
    cursor: pointer;
    transition: background 0.15s;
    border-bottom: 1px solid var(--border);
}
.service-row:hover { background: var(--bg-card); }
.service-row td {
    padding: 0.9rem 1rem;
    vertical-align: middle;
}
.service-row .svc-name {
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 0.5rem;
}
.service-row .svc-icon { font-size: 1.2rem; }
.service-row .svc-type {
    font-size: 0.75rem;
    color: var(--text-muted);
    background: var(--bg-card);
    padding: 0.15rem 0.5rem;
    border-radius: 4px;
    border: 1px solid var(--border);
}

/* ── Status Badge ── */
.status-badge {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    padding: 0.2rem 0.7rem;
    border-radius: 12px;
    font-size: 0.8rem;
    font-weight: 600;
}
.status-badge.online { background: var(--green-dim); color: var(--green); }
.status-badge.offline { background: var(--red-dim); color: var(--red); }
.status-badge.lastran { background: rgba(88, 166, 255, 0.12); color: var(--blue); }
.status-badge .badge-dot { width: 6px; height: 6px; border-radius: 50%; }
.status-badge.online .badge-dot { background: var(--green); animation: pulse-dot 2s infinite; }
.status-badge.offline .badge-dot { background: var(--red); }
.status-badge.lastran .badge-dot { background: var(--blue); }

.port-cell { font-family: monospace; font-size: 0.85rem; color: var(--text-muted); }
.expand-arrow { font-size: 0.7rem; color: var(--text-muted); transition: transform 0.2s; display: inline-block; }
.expanded .expand-arrow { transform: rotate(90deg); }

/* ── Action Panel ── */
.action-panel {
    display: none;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin: 0.5rem 1rem 0.75rem 1rem;
    padding: 1rem;
}
.action-panel.open { display: block; }
.action-panel .action-row {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
    align-items: center;
}
.action-panel .action-btn {
    padding: 0.5rem 0.9rem;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text);
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.8rem;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 0.35rem;
    text-decoration: none;
}
.action-panel .action-btn:hover {
    border-color: var(--accent);
    background: rgba(124, 58, 237, 0.08);
}
.action-panel .action-btn.restart-btn:hover {
    border-color: var(--orange);
    background: rgba(210, 153, 29, 0.08);
}
.action-panel .action-btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
}
.action-panel .action-btn:disabled:hover {
    border-color: var(--border);
    background: var(--bg);
}
.action-panel .restart-note {
    font-size: 0.75rem;
    color: var(--text-muted);
    margin-left: 0.5rem;
}

/* ── Modal ── */
.modal-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.7);
    z-index: 200;
    align-items: center;
    justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    width: 90%;
    max-width: 750px;
    max-height: 80vh;
    display: flex;
    flex-direction: column;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
}
.modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1.25rem 1.5rem;
    border-bottom: 1px solid var(--border);
}
.modal-header h2 {
    font-size: 1.1rem;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 0.5rem;
}
.modal-close {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-muted);
    font-size: 1.2rem;
    cursor: pointer;
    width: 32px;
    height: 32px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
}
.modal-close:hover { border-color: var(--red); color: var(--red); }
.modal-body {
    padding: 1.5rem;
    overflow-y: auto;
    flex: 1;
}
.modal-body pre {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 1rem;
    font-family: 'SF Mono', 'Fira Code', 'Fira Mono', Menlo, monospace;
    font-size: 0.8rem;
    line-height: 1.5;
    white-space: pre-wrap;
    word-break: break-word;
    color: var(--text-muted);
}
.modal-body .config-file {
    margin-bottom: 1rem;
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
}
.modal-body .config-file .cf-header {
    background: var(--bg);
    padding: 0.5rem 1rem;
    font-family: monospace;
    font-size: 0.75rem;
    color: var(--text-muted);
    border-bottom: 1px solid var(--border);
}
.modal-body .config-file .cf-body {
    padding: 1rem;
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 0.8rem;
    white-space: pre-wrap;
    word-break: break-word;
    max-height: 300px;
    overflow-y: auto;
}
.modal-body .config-file .cf-body.error { color: var(--red); }

/* ── Loading / Empty ── */
.loading-state {
    text-align: center;
    padding: 3rem 1rem;
    color: var(--text-muted);
}
.loading-state .spinner {
    display: inline-block;
    width: 32px;
    height: 32px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-bottom: 1rem;
}
@keyframes spin { to { transform: rotate(360deg); } }
.error-state {
    text-align: center;
    padding: 3rem 1rem;
    color: var(--red);
}
.error-state .err-icon { font-size: 2.5rem; margin-bottom: 0.5rem; }
.error-state .err-msg { font-size: 0.9rem; color: var(--text-muted); }
.detail-text { font-size: 0.8rem; color: var(--text-muted); margin-top: 0.25rem; font-style: italic; }

/* ── Restart Result Toast ── */
.toast {
    position: fixed;
    bottom: 2rem;
    right: 2rem;
    padding: 1rem 1.5rem;
    border-radius: 8px;
    font-size: 0.85rem;
    font-weight: 500;
    z-index: 300;
    animation: slide-up 0.3s ease-out;
    max-width: 400px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}
.toast.success { background: #1a3a1a; border: 1px solid var(--green); color: var(--green); }
.toast.error { background: #3a1a1a; border: 1px solid var(--red); color: var(--red); }
.toast.info { background: #1a2a3a; border: 1px solid var(--blue); color: var(--blue); }
@keyframes slide-up { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

/* ── Edit Config Modal ── */
.edit-modal { max-width: 700px; }
.edit-config-form { display: flex; flex-direction: column; gap: 0.75rem; }
.edit-label {
    font-size: 0.8rem;
    color: var(--text-muted);
    font-family: monospace;
    background: var(--bg);
    padding: 0.35rem 0.75rem;
    border-radius: 6px;
    border: 1px solid var(--border);
    word-break: break-all;
}
.edit-textarea {
    width: 100%;
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.75rem;
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    font-size: 0.8rem;
    line-height: 1.5;
    resize: vertical;
    outline: none;
    transition: border-color 0.2s;
}
.edit-textarea:focus { border-color: var(--accent); }
.edit-buttons {
    display: flex;
    gap: 0.5rem;
    justify-content: flex-end;
}
.edit-buttons .action-btn.save-btn:hover {
    border-color: var(--green);
    background: rgba(63, 185, 80, 0.08);
}
.edit-status {
    font-size: 0.8rem;
    min-height: 1.2rem;
}
.edit-status.success { color: var(--green); }
.edit-status.error { color: var(--red); }
.action-btn.edit-btn:hover {
    border-color: var(--orange);
    background: rgba(210, 153, 29, 0.08);
}

/* ── Responsive ── */
@media (max-width: 768px) {
    nav { padding: 0 1rem; }
    .service-table thead { display: none; }
    .service-row { display: block; padding: 0.75rem 0; }
    .service-row td { display: block; padding: 0.3rem 1rem; }
    .service-row td::before { content: attr(data-label); font-size: 0.7rem; color: var(--text-muted); display: block; margin-bottom: 0.15rem; }
}

/* ── Mobile phones (375-480px) ── */
@media (max-width: 480px) {
    body { overflow-x: hidden; }

    /* Nav — horizontal scroll */
    nav {
        padding: 0 0.75rem;
        height: auto;
        min-height: 52px;
    }
    nav .links {
        flex-wrap: nowrap;
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
        gap: 0.75rem;
        scrollbar-width: none;
    }
    nav .links::-webkit-scrollbar { display: none; }
    nav .links a { font-size: 0.8rem; padding: 0.45rem 0; }
    nav .logo { font-size: 1.05rem; }

    /* Container */
    .container, [style*="max-width:1100px"] {
        padding: 1rem !important;
    }

    /* Page header */
    .page-header { flex-direction: column; align-items: flex-start; }
    .page-header h1 { font-size: 1.2rem; }
    .header-right { flex-wrap: wrap; }

    /* Summary pills */
    .status-summary { gap: 0.5rem; }
    .stat-pill { font-size: 0.72rem; padding: 0.3rem 0.65rem; }

    /* Service table — scrollable */
    .service-table { display: block; overflow-x: auto; -webkit-overflow-scrolling: touch; }

    /* Tap targets */
    button, .action-btn, #refresh-btn, #auto-refresh-toggle, .modal-close {
        min-height: 44px;
    }
    .action-btn { padding: 0.55rem 0.8rem; }
    .modal-close { width: 44px; height: 44px; }

    /* Toast */
    .toast {
        left: 1rem;
        right: 1rem;
        bottom: 1rem;
        max-width: none;
    }

    /* Modal */
    .modal { width: 95vw; max-width: none; }
    .modal-header { padding: 1rem; }
    .modal-body { padding: 1rem; }

    /* Action panel */
    .action-panel { margin: 0.5rem 0.5rem 0.75rem 0.5rem; }
    .action-row { flex-direction: column; }
}
</style>
</head>

    <div style="max-width:1100px; margin: 0 auto; padding: 2rem;">

<script>
// ═══════════════════════════════════════════════
//  State
// ═══════════════════════════════════════════════

var autoRefresh = true;
var refreshTimer = null;
var servicesData = null;

// ═══════════════════════════════════════════════
//  API helpers
// ═══════════════════════════════════════════════

function apiUrl(path) {
    // Proxy through the main server so same-origin works
    return '/api' + path;
}

function fetchStatus() {
    document.getElementById('last-updated').textContent = 'Updating...';
    fetch(apiUrl('/status'))
        .then(function(r) { return r.json(); })
        .then(function(data) {
            servicesData = data;
            renderAll(data);
            var now = new Date();
            document.getElementById('last-updated').textContent =
                'Updated: ' + now.toLocaleTimeString('en-US', { hour12: false });
        })
        .catch(function(err) {
            document.getElementById('last-updated').textContent = 'Error loading';
            document.getElementById('service-tbody').innerHTML =
                '<tr><td colspan="5"><div class="error-state"><div class="err-icon">⚠️</div><div class="err-msg">Failed to load service status. API server may be down.</div></div></td></tr>';
        });
}

function fetchLogs(svcName) {
    var modalBody = document.getElementById('modal-body');
    modalBody.innerHTML = '<div class="loading-state"><div class="spinner"></div><div>Loading logs...</div></div>';
    document.getElementById('modal-title').innerHTML = '📋 Logs: ' + escHtml(svcName);
    document.getElementById('modal-overlay').classList.add('open');

    fetch(apiUrl('/service/' + svcName + '/logs'))
        .then(function(r) { return r.json(); })
        .then(function(data) {
            if (data.error) {
                modalBody.innerHTML = '<div class="error-state"><div class="err-icon">⚠️</div><div class="err-msg">' + escHtml(data.error) + '</div></div>';
            } else {
                var html = '';
                if (data.sources && data.sources.length) {
                    html += '<div style="font-size:0.8rem;color:var(--text-muted);margin-bottom:0.75rem">Sources: ' + data.sources.join(', ') + '</div>';
                }
                html += '<pre>' + escHtml(data.logs || '(empty)') + '</pre>';
                modalBody.innerHTML = html;
            }
        })
        .catch(function(err) {
            modalBody.innerHTML = '<div class="error-state"><div class="err-icon">⚠️</div><div class="err-msg">Failed to load logs: ' + escHtml(String(err)) + '</div></div>';
        });
}

function fetchConfig(svcName) {
    var modalBody = document.getElementById('modal-body');
    modalBody.innerHTML = '<div class="loading-state"><div class="spinner"></div><div>Loading config...</div></div>';
    document.getElementById('modal-title').innerHTML = '⚙️ Config: ' + escHtml(svcName);
    document.getElementById('modal-overlay').classList.add('open');

    fetch(apiUrl('/service/' + svcName + '/config'))
        .then(function(r) { return r.json(); })
        .then(function(data) {
            if (data.error) {
                modalBody.innerHTML = '<div class="error-state"><div class="err-icon">⚠️</div><div class="err-msg">' + escHtml(data.error) + '</div></div>';
            } else if (Object.keys(data.configs || {}).length === 0) {
                modalBody.innerHTML = '<div style="color:var(--text-muted);text-align:center;padding:2rem">No configuration files available.' + (data.note ? '<br><br>' + escHtml(data.note) : '') + '</div>';
            } else {
                var html = '';
                Object.keys(data.configs).forEach(function(path) {
                    var content = data.configs[path];
                    var isErr = content && (content.startsWith('Error ') || content === 'File not found');
                    html += '<div class="config-file">';
                    html += '<div class="cf-header">' + escHtml(path) + '</div>';
                    html += '<div class="cf-body' + (isErr ? ' error' : '') + '">' + escHtml(content) + '</div>';
                    html += '</div>';
                });
                if (data.note) {
                    html += '<div style="font-size:0.8rem;color:var(--text-muted);margin-top:0.5rem">' + escHtml(data.note) + '</div>';
                }
                modalBody.innerHTML = html;
            }
        })
        .catch(function(err) {
            modalBody.innerHTML = '<div class="error-state"><div class="err-icon">⚠️</div><div class="err-msg">Failed to load config: ' + escHtml(String(err)) + '</div></div>';
        });
}

function doRestart(svcName) {
    showToast('Restarting ' + escHtml(svcName) + '...', 'info');
    fetch(apiUrl('/service/' + svcName + '/restart'), { method: 'POST' })
        .then(function(r) { return r.json(); })
        .then(function(data) {
            if (data.result === 'success') {
                showToast('✅ ' + data.message, 'success');
            } else if (data.result === 'auth_required') {
                showToast('🔒 ' + data.message, 'error');
            } else if (data.result === 'unavailable') {
                showToast('ℹ️ ' + data.message, 'info');
            } else {
                showToast('❌ ' + (data.message || 'Restart failed'), 'error');
            }
        })
        .catch(function(err) {
            showToast('❌ Restart request failed: ' + escHtml(String(err)), 'error');
        });
}

// ═══════════════════════════════════════════════
//  Render
// ═══════════════════════════════════════════════

function renderAll(data) {
    renderSummary(data);
    renderTable(data);
}

function renderSummary(data) {
    var svcs = data.services || {};
    var online = 0, offline = 0, other = 0;
    Object.values(svcs).forEach(function(s) {
        if (s.status === 'Online') online++;
        else if (s.status === 'Offline') offline++;
        else other++;
    });
    var summary = document.getElementById('status-summary');
    summary.innerHTML =
        '<div class="stat-pill ok">🟢 ' + online + ' Online</div>' +
        (offline > 0 ? '<div class="stat-pill err">🔴 ' + offline + ' Offline</div>' : '') +
        (other > 0 ? '<div class="stat-pill warn">🟡 ' + other + ' Other</div>' : '') +
        '<div class="stat-pill" style="color:var(--text-muted)">📦 ' + Object.keys(svcs).length + ' Total</div>';
}

function renderTable(data) {
    var svcs = data.services || {};
    var keys = Object.keys(svcs);
    if (keys.length === 0) {
        document.getElementById('service-tbody').innerHTML =
            '<tr><td colspan="5"><div class="error-state"><div class="err-msg">No services found</div></div></td></tr>';
        return;
    }

    var html = '';
    keys.forEach(function(key) {
        var svc = svcs[key];
        var statusClass = svc.status === 'Online' ? 'online' : (svc.status === 'Offline' ? 'offline' : 'lastran');
        var icon = svcIcon(key);
        var portStr = svc.port !== null && svc.port !== undefined ? svc.port : '—';
        var typeLabel = (svc.type || 'unknown').replace('_', ' ');

        html += '<tr class="service-row" onclick="toggleActions(this, \'' + escAttr(key) + '\', \'' + escAttr(svc.name) + '\', ' + (svc.restart_available ? 'true' : 'false') + ')">';
        html += '<td data-label="Service"><div class="svc-name"><span class="svc-icon">' + icon + '</span>' + escHtml(svc.name) + '</div></td>';
        html += '<td data-label="Type"><span class="svc-type">' + escHtml(typeLabel) + '</span></td>';
        html += '<td data-label="Status"><span class="status-badge ' + statusClass + '"><span class="badge-dot"></span>' + escHtml(svc.status) + '</span></td>';
        html += '<td data-label="Port"><span class="port-cell">' + portStr + '</span></td>';
        html += '<td><span class="expand-arrow">▶</span></td>';
        html += '</tr>';
        // Action panel row (hidden by default)
        html += '<tr class="action-row-tr"><td colspan="5"><div class="action-panel" id="panel-' + key + '"></div></td></tr>';
    });
    document.getElementById('service-tbody').innerHTML = html;
}

function svcIcon(key) {
    var icons = {
        hermes_dashboard: '📊',
        ollama: '🦙',
        cloudflare_tunnel: '🌐',
        searxng: '🔍',
        llm_router: '🧭',
        github_backup: '💾'
    };
    return icons[key] || '📦';
}

// ═══════════════════════════════════════════════
//  Actions — expand / collapse rows
// ═══════════════════════════════════════════════

var openPanel = null;

function toggleActions(row, svcKey, svcName, canRestart) {
    var arrow = row.querySelector('.expand-arrow');
    var panel = document.getElementById('panel-' + svcKey);

    if (panel.classList.contains('open')) {
        // Close this one
        panel.classList.remove('open');
        row.classList.remove('expanded');
        openPanel = null;
        return;
    }

    // Close any open panel
    if (openPanel) {
        openPanel.classList.remove('open');
        var openRow = document.querySelector('.service-row.expanded');
        if (openRow) openRow.classList.remove('expanded');
    }

    // Open this one
    panel.classList.add('open');
    row.classList.add('expanded');
    openPanel = panel;

    // Build action buttons if not already built
    if (!panel.dataset.built) {
        panel.dataset.built = '1';

        // Docs URLs for each service
        var docsUrl = getDocsUrl(svcKey);

        var btnHtml = '<div class="action-row">';
        btnHtml += '<button class="action-btn" onclick="event.stopPropagation(); fetchLogs(\'' + escAttr(svcKey) + '\')">📋 View Logs</button>';
        btnHtml += '<button class="action-btn" onclick="event.stopPropagation(); fetchConfig(\'' + escAttr(svcKey) + '\')">⚙️ View Config</button>';
        btnHtml += '<button class="action-btn edit-btn" onclick="event.stopPropagation(); fetchConfigForEdit(\'' + escAttr(svcKey) + '\', \'' + escAttr(svcName) + '\')">✏️ Edit Config</button>';
        if (docsUrl) {
            btnHtml += '<a href="' + escHtml(docsUrl) + '" target="_blank" rel="noopener" class="action-btn" onclick="event.stopPropagation()">📖 Docs</a>';
        }
        if (canRestart) {
            btnHtml += '<button class="action-btn restart-btn" onclick="event.stopPropagation(); confirmRestart(\'' + escAttr(svcKey) + '\', \'' + escAttr(svcName) + '\')">🔄 Restart</button>';
        } else {
            btnHtml += '<button class="action-btn" disabled title="Restart not available for this service">🔄 Restart</button><span class="restart-note">Docker/remote — manual restart required</span>';
        }
        btnHtml += '</div>';
        panel.innerHTML = btnHtml;
    }
}

function getDocsUrl(key) {
    var urls = {
        hermes_dashboard: 'https://hermes-agent.nousresearch.com/docs',
        ollama: 'https://ollama.com/docs',
        cloudflare_tunnel: 'https://developers.cloudflare.com/cloudflare-one/connections/connect-networks/',
        searxng: 'https://docs.searxng.org/',
        llm_router: 'https://hermes-agent.nousresearch.com/docs',
        github_backup: 'https://docs.github.com/en/rest'
    };
    return urls[key] || null;
}

function confirmRestart(svcKey, svcName) {
    if (!window.showConfirmDialog) {
        // Fallback if confirm dialog not available
        if (confirm('Restart ' + svcName + '?')) {
            doRestart(svcKey);
        }
        return;
    }
    showConfirmDialog({
        title: 'Restart ' + svcName,
        description: 'This will restart the ' + svcName + ' service. Active connections may be interrupted.',
        icon: '🔄',
        requireConfirmText: true,
        confirmText: 'RESTART',
        labelConfirm: 'Restart',
        labelCancel: 'Cancel',
        onConfirm: function() { doRestart(svcKey); }
    });
}

// ═══════════════════════════════════════════════
//  Modal
// ═══════════════════════════════════════════════

function closeModal() {
    document.getElementById('modal-overlay').classList.remove('open');
}

document.getElementById('modal-overlay').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
});
document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') {
        if (document.getElementById('edit-modal-overlay').classList.contains('open')) {
            closeEditModal();
        } else {
            closeModal();
        }
    }
});

// ═══════════════════════════════════════════════
//  Edit Config
// ═══════════════════════════════════════════════

var editingService = null;
var editingPath = null;

function closeEditModal() {
    document.getElementById('edit-modal-overlay').classList.remove('open');
    editingService = null;
    editingPath = null;
}

document.getElementById('edit-modal-overlay').addEventListener('click', function(e) {
    if (e.target === this) closeEditModal();
});

function fetchConfigForEdit(svcKey, svcName) {
    var textarea = document.getElementById('edit-config-textarea');
    var pathLabel = document.getElementById('edit-path-label');
    var statusEl = document.getElementById('edit-status');
    var saveBtn = document.getElementById('edit-save-btn');

    pathLabel.textContent = 'Loading config...';
    textarea.value = '';
    statusEl.textContent = '';
    statusEl.className = 'edit-status';
    saveBtn.disabled = true;
    document.getElementById('edit-modal-title').innerHTML = '✏️ Edit Config: ' + escHtml(svcName);
    document.getElementById('edit-modal-overlay').classList.add('open');

    fetch(apiUrl('/service/' + svcKey + '/config'))
        .then(function(r) { return r.json(); })
        .then(function(data) {
            if (data.error) {
                pathLabel.textContent = '';
                textarea.value = '';
                statusEl.textContent = 'Error: ' + data.error;
                statusEl.className = 'edit-status error';
                return;
            }
            var paths = Object.keys(data.configs || {});
            if (paths.length === 0) {
                pathLabel.textContent = '';
                textarea.value = '';
                statusEl.textContent = 'No editable config files available for this service.' + (data.note ? ' ' + data.note : '');
                statusEl.className = 'edit-status error';
                return;
            }
            // Use first path (can be extended to let user pick)
            var configPath = paths[0];
            var content = data.configs[configPath] || '';
            if (content.startsWith('Error ') || content === 'File not found') {
                pathLabel.textContent = configPath;
                textarea.value = '';
                statusEl.textContent = 'Cannot edit: ' + content;
                statusEl.className = 'edit-status error';
                return;
            }
            editingService = svcKey;
            editingPath = configPath;
            pathLabel.textContent = 'File: ' + configPath;
            textarea.value = content;
            saveBtn.disabled = false;
        })
        .catch(function(err) {
            pathLabel.textContent = '';
            textarea.value = '';
            statusEl.textContent = 'Failed to load config: ' + escHtml(String(err));
            statusEl.className = 'edit-status error';
        });
}

function saveConfig() {
    if (!editingService || !editingPath) return;
    var textarea = document.getElementById('edit-config-textarea');
    var statusEl = document.getElementById('edit-status');
    var saveBtn = document.getElementById('edit-save-btn');
    var content = textarea.value;

    statusEl.textContent = 'Saving...';
    statusEl.className = 'edit-status';
    saveBtn.disabled = true;

    fetch(apiUrl('/service/' + editingService + '/config'), {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ path: editingPath, content: content })
    })
        .then(function(r) { return r.json(); })
        .then(function(data) {
            if (data.result === 'saved') {
                statusEl.textContent = '✅ ' + data.message;
                statusEl.className = 'edit-status success';
                showToast('Config saved: ' + editingPath, 'success');
                // Close after short delay
                setTimeout(function() { closeEditModal(); }, 1500);
            } else {
                statusEl.textContent = '❌ ' + (data.error || data.message || 'Save failed');
                statusEl.className = 'edit-status error';
                saveBtn.disabled = false;
            }
        })
        .catch(function(err) {
            statusEl.textContent = '❌ Request failed: ' + escHtml(String(err));
            statusEl.className = 'edit-status error';
            saveBtn.disabled = false;
        });
}

// ═══════════════════════════════════════════════
//  Toast
// ═══════════════════════════════════════════════

function showToast(msg, type) {
    var toast = document.createElement('div');
    toast.className = 'toast ' + (type || 'info');
    toast.textContent = msg;
    document.body.appendChild(toast);
    setTimeout(function() {
        toast.style.opacity = '0';
        toast.style.transition = 'opacity 0.3s';
        setTimeout(function() { toast.remove(); }, 300);
    }, 4000);
}

// ═══════════════════════════════════════════════
//  Helpers
// ═══════════════════════════════════════════════

function escHtml(s) {
    if (!s) return '';
    return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}
function escAttr(s) {
    if (!s) return '';
    return String(s).replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/'/g, '&#39;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

// ═══════════════════════════════════════════════
//  Auto-refresh
// ═══════════════════════════════════════════════

function toggleAutoRefresh() {
    autoRefresh = !autoRefresh;
    var btn = document.getElementById('auto-refresh-toggle');
    btn.classList.toggle('on', autoRefresh);
    if (autoRefresh) {
        refreshTimer = setInterval(fetchStatus, 30000);
        fetchStatus();
    } else {
        clearInterval(refreshTimer);
        refreshTimer = null;
    }
}

// ═══════════════════════════════════════════════
//  Init
// ═══════════════════════════════════════════════

document.addEventListener('DOMContentLoaded', function() {
    fetchStatus();
    refreshTimer = setInterval(fetchStatus, 30000);

    document.getElementById('refresh-btn').addEventListener('click', fetchStatus);
    document.getElementById('auto-refresh-toggle').addEventListener('click', toggleAutoRefresh);
});
</script>

<script>
(function() {
  function setupNavDropdowns() {
    var dropdowns = Array.prototype.slice.call(document.querySelectorAll('details.nav-dropdown'));
    dropdowns.forEach(function(dropdown) {
      dropdown.addEventListener('toggle', function() {
        if (dropdown.open) {
          dropdowns.forEach(function(other) { if (other !== dropdown) other.open = false; });
        }
      });
    });
    document.addEventListener('click', function(e) {
      if (!e.target.closest('details.nav-dropdown')) {
        dropdowns.forEach(function(dropdown) { dropdown.open = false; });
      }
    });
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') {
        dropdowns.forEach(function(dropdown) { dropdown.open = false; });
      }
    });
  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', setupNavDropdowns);
  } else {
    setupNavDropdowns();
  }
})();
</script>
